<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>送礼物给江晦</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0f;
  --bg-card: #161620;
  --bg-elevated: #1e1e2d;
  --text-primary: #FFFFFF;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.3);
  --accent: #7C9CFF;
  --accent-soft: rgba(124,156,255,0.15);
  --npc-color: #7C9CFF;
  --user-color: #F4A0C0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: #000;
  color: var(--text-primary);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

.app-shell {
  width: 390px;
  height: 844px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

.status-bar {
  height: 54px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 8px;
  font-size: 15px;
  font-weight: 600;
  position: relative;
  z-index: 100;
}

/* Pages */
.page {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
  overflow-y: auto;
  scrollbar-width: none;
}
.page::-webkit-scrollbar { display: none; }
.page.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

/* HOME */
.home-header {
  padding: 0 24px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.home-header h1 { font-size: 22px; font-weight: 700; }
.backpack-btn {
  background: var(--bg-elevated);
  border: none;
  color: var(--text-primary);
  width: 44px; height: 44px;
  border-radius: 12px;
  font-size: 22px;
  cursor: pointer;
  position: relative;
}
.backpack-btn .badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.char-card {
  margin: 0 24px 20px;
  background: var(--bg-card);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.char-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--accent);
}
.char-info h3 { font-size: 18px; font-weight: 600; }
.char-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.char-mood {
  font-size: 12px;
  color: var(--accent);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.mood-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.gift-status {
  margin: 0 24px 20px;
  padding: 14px 18px;
  background: var(--accent-soft);
  border-radius: 14px;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.gift-status .left { display: flex; align-items: center; gap: 8px; }
.gift-quota { color: var(--accent); font-weight: 600; }

.camera-section { margin: 0 24px 20px; }
.camera-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.camera-area {
  width: 100%;
  height: 280px;
  background: var(--bg-card);
  border-radius: 20px;
  border: 2px dashed rgba(255,255,255,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.camera-area:hover { border-color: var(--accent); background: var(--accent-soft); }
.camera-area .camera-icon { font-size: 48px; }
.camera-area p { font-size: 14px; color: var(--text-secondary); }
.camera-area .hint { font-size: 12px; color: var(--text-tertiary); }
.camera-preview {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 18px;
  display: none;
}
.camera-preview:not([src]),
.camera-preview[src=""] {
  display: none !important;
}
.camera-area.has-photo { border: none; }
.camera-area.has-photo .camera-icon,
.camera-area.has-photo p,
.camera-area.has-photo .hint { display: none; }
.camera-area.has-photo .camera-preview { display: block; }

/* Scanning overlay */
.scanning-overlay {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  overflow: hidden;
  display: none;
  background: rgba(0,0,0,0.3);
}
.scanning-overlay.show { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.scanning-line {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scanLine 1.5s ease-in-out infinite;
}
@keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }
.scanning-text {
  font-size: 14px;
  color: var(--accent);
  background: rgba(0,0,0,0.7);
  padding: 8px 20px;
  border-radius: 20px;
  white-space: nowrap;
  z-index: 2;
}
.scanning-spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(124,156,255,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  z-index: 2;
}
@keyframes spin { to { transform: rotate(360deg); } }

.send-btn-area { margin: 0 24px 20px; }
.send-btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
.send-btn.show { display: block; }
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.5; }

/* Recent gifts */
.recent-section { margin: 0 24px 40px; }
.recent-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.recent-list {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}
.recent-list::-webkit-scrollbar { display: none; }
.recent-item { flex-shrink: 0; width: 80px; text-align: center; cursor: pointer; }
.recent-item-img {
  width: 80px; height: 80px;
  border-radius: 14px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--bg-card);
  margin-bottom: 6px;
  overflow: hidden;
}
.recent-item-img img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.recent-item-img .emoji-fallback {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}
.recent-item-name {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.recent-item-rarity { font-size: 10px; font-weight: 600; margin-top: 2px; }

/* TRANSFORM PAGE */
.transform-page {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.transform-container {
  text-align: center;
  padding: 0 32px;
  width: 100%;
}
.transform-photos {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
}
.transform-photo {
  width: 130px; height: 130px;
  border-radius: 16px;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.1);
}
.transform-arrow {
  font-size: 28px;
  opacity: 0;
  animation: fadeInScale 0.5s 0.5s forwards;
}
@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}
.transform-result {
  width: 140px; height: 140px;
  margin: 0 auto;
  border-radius: 20px;
  overflow: hidden;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.transform-result.show { opacity: 1; transform: scale(1); }
.transform-result img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: saturate(1.3) contrast(1.1) brightness(1.05);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 18px;
}
.transform-result-glow {
  position: absolute;
  inset: -6px;
  border-radius: 26px;
  opacity: 0.3;
  filter: blur(14px);
  z-index: -1;
}
.transform-item-name {
  font-size: 20px;
  font-weight: 600;
  margin-top: 16px;
  opacity: 0;
  animation: fadeIn 0.5s 1.5s forwards;
}
.transform-rarity {
  font-size: 14px;
  font-weight: 600;
  margin-top: 6px;
  opacity: 0;
  animation: fadeIn 0.5s 1.7s forwards;
}
.transform-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
  opacity: 0;
  animation: fadeIn 0.5s 1.9s forwards;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.transform-send-btn {
  margin-top: 28px;
  padding: 14px 48px;
  border-radius: 28px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0;
  animation: fadeIn 0.5s 2.2s forwards;
}
.transform-send-btn:active { transform: scale(0.97); }

/* REACTION PAGE */
.reaction-page {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  height: 100%;
}
.reaction-header {
  padding: 54px 24px 16px;
  text-align: center;
}
.reaction-header h2 { font-size: 18px; font-weight: 600; }

.reaction-scene {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
}
.reaction-avatar {
  width: 100px; height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--accent);
  margin-bottom: 16px;
  animation: avatarBounce 0.6s ease-out;
}
@keyframes avatarBounce {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
.reaction-gift-display {
  width: 80px; height: 80px;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
  animation: giftFloat 3s ease-in-out infinite;
  border: 2px solid rgba(255,255,255,0.1);
}
.reaction-gift-display img {
  width: 100%; height: 100%;
  object-fit: cover;
}
@keyframes giftFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.reaction-bubble {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 20px 24px;
  max-width: 320px;
  position: relative;
  margin-bottom: 16px;
  opacity: 0;
  animation: bubbleIn 0.5s 0.3s forwards;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.reaction-bubble::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-bottom: 8px solid var(--bg-card);
}
.reaction-char-name {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
.reaction-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-primary);
}
.reaction-action {
  font-size: 13px;
  color: var(--text-tertiary);
  font-style: italic;
  margin-top: 8px;
}
.reaction-status {
  font-size: 13px;
  color: var(--accent);
  opacity: 0;
  animation: fadeIn 0.5s 1s forwards;
  margin-bottom: 6px;
}
.reaction-buttons {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  opacity: 0;
  animation: fadeIn 0.5s 1.2s forwards;
}
.reaction-btn {
  padding: 12px 28px;
  border-radius: 28px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.reaction-btn.primary { background: var(--accent); color: white; }
.reaction-btn.secondary { background: var(--bg-elevated); color: var(--text-primary); }

/* BACKPACK PAGE */
.backpack-page { background: var(--bg); }
.backpack-header {
  padding: 54px 24px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.backpack-back {
  background: none; border: none;
  color: var(--text-primary);
  font-size: 24px;
  cursor: pointer;
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.backpack-header h2 { font-size: 20px; font-weight: 700; }
.backpack-count { font-size: 14px; color: var(--text-secondary); margin-left: auto; }

.room-view {
  margin: 0 24px 20px;
  height: 180px;
  background: var(--bg-card);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.room-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  opacity: 0.6;
}
.room-items {
  position: relative; z-index: 1;
  display: flex;
  gap: 10px;
  padding: 40px 16px 16px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}
.room-item {
  width: 48px; height: 48px;
  border-radius: 10px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}
.room-item:hover { transform: scale(1.15); }
.room-item img { width: 100%; height: 100%; object-fit: cover; }
.room-item .emoji-only { font-size: 24px; }
.room-label {
  position: absolute;
  top: 12px; left: 16px;
  font-size: 12px;
  color: var(--text-tertiary);
  z-index: 2;
}
.room-char {
  position: absolute; top: 12px; right: 16px; z-index: 2;
}
.room-char img {
  width: 48px; height: 48px;
  border-radius: 50%;
  object-fit: cover;
  opacity: 0.7;
  border: 2px solid rgba(124,156,255,0.3);
}

.filter-tabs {
  display: flex; gap: 8px;
  padding: 0 24px; margin-bottom: 16px;
  overflow-x: auto; scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.filter-tab.active { background: var(--accent); color: white; }

.item-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 0 24px 100px;
}
.grid-item {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.grid-item:active { transform: scale(0.95); }
.grid-item-visual {
  width: 80px; height: 80px;
  margin: 0 auto 8px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
}
.grid-item-visual img { width: 100%; height: 100%; object-fit: cover; }
.grid-item-visual .emoji-fallback { font-size: 36px; }
.grid-item-name {
  font-size: 12px;
  color: var(--text-primary);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.grid-item-date { font-size: 10px; color: var(--text-tertiary); }
.grid-item-rarity {
  position: absolute;
  top: 8px; right: 8px;
  width: 8px; height: 8px;
  border-radius: 50%;
}

/* Item detail modal */
.item-detail-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.item-detail-overlay.show { opacity: 1; pointer-events: auto; }
.item-detail-modal {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-radius: 24px 24px 0 0;
  padding: 24px 24px 40px;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.item-detail-modal.show { transform: translateY(0); }
.detail-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none;
  color: var(--text-secondary); font-size: 20px; cursor: pointer;
}
.detail-visual {
  width: 100px; height: 100px;
  margin: 8px auto 16px;
  border-radius: 16px;
  overflow: hidden;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-visual img { width: 100%; height: 100%; object-fit: cover; }
.detail-visual .emoji-fallback { font-size: 56px; }
.detail-name { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.detail-rarity-tag { text-align: center; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
.detail-section { margin-bottom: 16px; }
.detail-section-title { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
.detail-section-content { font-size: 14px; line-height: 1.6; color: var(--text-secondary); }
.detail-memory {
  background: var(--bg-elevated);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 12px;
}
.detail-memory-name { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.detail-memory-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

/* Toast */
.toast {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(124,156,255,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(124,156,255,0.3);
  color: var(--accent);
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 400;
  max-width: 80%;
  text-align: center;
}
.toast.show { opacity: 1; }

/* Error toast */
.toast.error {
  background: rgba(239,68,68,0.15);
  border-color: rgba(239,68,68,0.3);
  color: #EF4444;
}

/* Hidden file input */
#fileInput { display: none; }
</style>
</head>
<body>

<div class="app-shell" id="app">

<!-- HOME PAGE -->
<div class="page" id="homePage">
  <div class="status-bar">14:52</div>
  
  <div class="home-header">
    <h1>送礼物 🎁</h1>
    <button class="backpack-btn" onclick="showBackpack()">
      🎒
      <span class="badge" id="backpackBadge">7</span>
    </button>
  </div>

  <div class="char-card">
    <img class="char-avatar" src="https://xingyeai-images-cdn.oss-cn-shanghai.aliyuncs.com/talkie-user-img/241049801728340/272571779465624.jpeg" alt="江晦">
    <div class="char-info">
      <h3>江晦</h3>
      <p>爱搭不理但偷偷在意的大型犬</p>
      <div class="char-mood">
        <span class="mood-dot"></span>
        <span id="moodText">心情不错，正在发呆</span>
      </div>
    </div>
  </div>

  <div class="gift-status">
    <div class="left">
      <span>🎁</span>
      <span>今日免费送礼次数</span>
    </div>
    <span class="gift-quota" id="giftQuota">1/1</span>
  </div>

  <div class="camera-section">
    <h2>拍一件礼物送给TA</h2>
    <div class="camera-area" id="cameraArea" onclick="document.getElementById('fileInput').click()">
      <img class="camera-preview" id="cameraPreview" src="" style="display:none">
      <div class="scanning-overlay" id="scanOverlay">
        <div class="scanning-line"></div>
        <div class="scanning-spinner"></div>
        <div class="scanning-text" id="scanText">识别物品中…</div>
      </div>
      <span class="camera-icon">📷</span>
      <p>点击拍照或选择图片</p>
      <span class="hint">拍下你想送给江晦的东西</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
  </div>

  <div class="send-btn-area">
    <button class="send-btn" id="sendBtn" onclick="startTransform()">送给江晦 ✨</button>
  </div>

  <div class="recent-section">

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    currentPhotoBase64 = dataUrl.split(',')[1];
    
    const preview = document.getElementById('cameraPreview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    
    const area = document.getElementById('cameraArea');
    area.classList.add('has-photo');
    
    document.getElementById('sendBtn').classList.add('show');
  };
  reader.readAsDataURL(file);
  
  // Reset file input so same file can be selected again
  input.value = '';
}

async function callGeminiText(prompt, imageBase64) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  
  const parts = [];
  if (imageBase64) {
    parts.push({
      inlineData: {
        mimeType: 'image/jpeg',
        data: imageBase64
      }
    });
  }
  parts.push({ text: prompt });

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: {
        temperature: 0.9,
        maxOutputTokens: 4096,
        thinkingConfig: { thinkingBudget: 0 }
      }
    })
  });

  const data = await resp.json();
  console.log('Gemini text response:', JSON.stringify(data).slice(0, 500));
  if (data.candidates && data.candidates[0] && data.candidates[0].content) {
    return data.candidates[0].content.parts[0].text;
  }
  const errMsg = data.error ? data.error.message : JSON.stringify(data).slice(0, 200);
  throw new Error('API错误: ' + errMsg);
}

async function callGeminiImage(prompt, imageBase64) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_IMAGE_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  
  const parts = [];
  if (imageBase64) {
    parts.push({
      inlineData: {
        mimeType: 'image/jpeg',
        data: imageBase64
      }
    });
  }
  parts.push({ text: prompt });

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: {
        responseModalities: ['TEXT', 'IMAGE'],
        temperature: 0.8
      }
    })
  });

  const data = await resp.json();
  console.log('Gemini image response:', JSON.stringify(data).slice(0, 500));
  if (data.candidates && data.candidates[0] && data.candidates[0].content) {
    const resultParts = data.candidates[0].content.parts;
    let image = null;
    let text = '';
    for (const part of resultParts) {
      if (part.inlineData) {
        image = 'data:' + part.inlineData.mimeType + ';base64,' + part.inlineData.data;
      }
      if (part.text) {
        text += part.text;
      }
    }
    return { image, text };
  }
  const errMsg = data.error ? data.error.message : JSON.stringify(data).slice(0, 200);
  throw new Error('生图API错误: ' + errMsg);
}

function formatNow() {

}

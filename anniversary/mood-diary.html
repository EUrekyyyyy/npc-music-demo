<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心情日记</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --paper: #FDF6EC;
  --paper-deep: #F5E6D0;
  --paper-line: rgba(90,74,58,0.08);
  --ink: #5A4A3A;
  --ink-light: rgba(90,74,58,0.5);
  --ink-faint: rgba(90,74,58,0.2);
  --pink: #E89AAF;
  --pink-soft: rgba(232,154,175,0.15);
  --blue: #7BA3C9;
  --blue-soft: rgba(123,163,201,0.15);
  --mint: #9EC5AB;
  --lavender: #C3B1E1;
  --peach: #F5C7A9;
  --tape-pink: rgba(255,182,193,0.35);
  --tape-blue: rgba(173,216,230,0.35);
  --tape-yellow: rgba(255,239,170,0.45);
  --tape-green: rgba(180,220,180,0.35);
  --shadow: 0 2px 8px rgba(90,74,58,0.08);
}

body {
  font-family: 'Ma Shan Zheng', 'PingFang SC', cursive;
  background: var(--paper);
  color: var(--ink);
  width: 390px; height: 844px;
  overflow: hidden; position: relative; margin: 0 auto;
}

/* ===== Status Bar ===== */
.status-bar { height: 44px; }

/* ===== Pages ===== */
.page { position: absolute; inset: 0; display: none; flex-direction: column; }
.page.active { display: flex; }

/* ===== NPC Header Banner — washi tape style ===== */
.npc-banner {
  position: relative; overflow: visible;
  margin: 0 16px; border-radius: 14px;
  background: #fff;
  margin-bottom: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}

.npc-avatar-wrap { position: relative; flex-shrink: 0; }
.npc-avatar {
  width: 50px; height: 50px; border-radius: 50%;
  object-fit: cover; border: 3px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  background: var(--paper-deep);
}
.npc-bubble {
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: #fff; border: 1px dashed var(--pink);
  border-radius: 8px; padding: 3px 8px;
  font-size: 10px; color: var(--pink); white-space: nowrap;
  margin-bottom: 6px; font-family: 'Ma Shan Zheng', cursive;
  animation: bubbleFloat 3s ease-in-out infinite;
}
.npc-bubble::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent; border-top-color: var(--pink);
}
@keyframes bubbleFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-3px); }
}
.npc-banner-info { flex: 1; min-width: 0; }
.npc-banner-title {
  font-size: 17px; font-weight: 400; margin-bottom: 4px;
  color: var(--ink); font-family: 'Ma Shan Zheng', cursive;
}
.npc-banner-days {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--pink-soft); border-radius: 8px;
  padding: 3px 10px; font-size: 12px; color: var(--pink);
  font-family: 'Caveat', cursive;
}
.npc-banner-days .day-count {
  font-weight: 600; font-size: 16px; color: var(--pink);
  display: inline-block; transition: transform 0.3s;
  font-family: 'Caveat', cursive;
}
.npc-banner-days .day-count.bounce { animation: dayBounce 0.6s ease; }
@keyframes dayBounce {
  0% { transform: scale(1); } 30% { transform: scale(1.4) translateY(-4px); }
  50% { transform: scale(0.9); } 70% { transform: scale(1.15); } 100% { transform: scale(1); }
}

/* ===== Calendar ===== */
.cal-header {
  padding: 0 20px 8px; display: flex;
  align-items: center; justify-content: space-between;
}
.cal-header .month-nav { display: flex; align-items: center; gap: 12px; }
.cal-header .month-nav button {
  background: none; border: none; color: var(--ink-light);
  font-size: 20px; padding: 4px; cursor: pointer; font-family: 'Caveat', cursive;
}
.cal-header .month-title {
  font-size: 18px; font-weight: 400; color: var(--ink);
  font-family: 'Ma Shan Zheng', cursive;
}
.cal-header .summary-btn {
  background: #fff; border: 1px dashed var(--ink-faint);
  color: var(--ink-light); padding: 5px 7px;
  border-radius: 50%; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  width: 30px; height: 30px; box-shadow: var(--shadow);
}

.cal-legend {
  display: flex; justify-content: center; gap: 16px;
  padding: 0 20px 6px; font-size: 11px;
  font-family: 'Ma Shan Zheng', cursive;
}
.cal-legend span { display: flex; align-items: center; gap: 4px; color: var(--ink-light); }
.cal-legend .leg-icon { width: 14px; height: 14px; }

.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 10px; margin-bottom: 2px;
}
.cal-weekdays span {
  text-align: center; font-size: 11px; color: var(--ink-light);
  font-weight: 400; font-family: 'Ma Shan Zheng', cursive;
}

.cal-grid {
  flex: 1; overflow-y: auto; padding: 0 4px 60px;
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 0; align-content: start;
  -webkit-overflow-scrolling: touch;
}

.cal-day {
  display: flex; flex-direction: column; align-items: center;
  padding: 3px 0; cursor: pointer; border-radius: 6px;
  transition: background 0.15s; min-height: 78px;
}
.cal-day:active { background: var(--pink-soft); }
.cal-day.empty { cursor: default; }
.cal-day.today {
  background: var(--tape-yellow);
  border-radius: 6px;
}
.cal-day.today .day-num {
  background: var(--pink); color: #fff; border-radius: 50%;
  width: 18px; height: 18px; display: flex; align-items: center;
  justify-content: center; font-size: 10px;
}
.day-num {
  font-size: 10px; color: var(--ink-light); margin-bottom: 2px;
  font-weight: 400; font-family: 'Caveat', cursive; font-size: 12px;
}
.day-moods { display: flex; flex-direction: column; gap: 1px; align-items: center; }
.day-mood-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.day-mood-icon svg { width: 100%; height: 100%; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1)); }
.day-mood-icon.empty-icon { opacity: 0.4; }
.day-mood-icon.empty-icon svg { filter: none; }

/* ===== FAB write button — sticker style ===== */
.fab-write {
  position: absolute; bottom: 28px; right: 20px; z-index: 100;
  width: 50px; height: 50px; border-radius: 50%;
  background: #fff;
  border: 2px dashed var(--pink);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 3px 12px rgba(232,154,175,0.3);
  color: var(--pink); font-size: 20px;
  transition: transform 0.2s;
}
.fab-write:active { transform: scale(0.9) rotate(-5deg); }

/* ===== Backfill Dialog — cute note ===== */
.backfill-dialog {
  position: absolute; inset: 0; z-index: 300;
  background: rgba(90,74,58,0.3); display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
.backfill-dialog.active { display: flex; }
.backfill-card {
  background: #fff; border: 1px dashed var(--ink-faint);
  border-radius: 4px; padding: 28px; text-align: center;
  width: 260px; box-shadow: 0 4px 20px rgba(90,74,58,0.15);
  border-radius: 12px;
}
.backfill-card .bf-title { font-size: 18px; margin-bottom: 8px; font-family: 'Ma Shan Zheng', cursive; }
.backfill-card .bf-desc { font-size: 13px; color: var(--ink-light); margin-bottom: 18px; font-family: 'Ma Shan Zheng', cursive; }
.backfill-card .bf-btns { display: flex; gap: 10px; }
.backfill-card .bf-btn {
  flex: 1; padding: 9px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 400; cursor: pointer;
  font-family: 'Ma Shan Zheng', cursive;
}
.backfill-card .bf-btn.cancel { background: var(--paper-deep); color: var(--ink-light); }
.backfill-card .bf-btn.pay { background: var(--pink); color: #fff; }

/* ===== Mood Picker — journal page ===== */
.mood-picker {
  position: absolute; inset: 0; z-index: 200;
  background: var(--paper); display: none; flex-direction: column;
}
.mood-picker.active { display: flex; }
.mood-picker-header {
  padding: 56px 24px 0; display: flex;
  justify-content: space-between; align-items: flex-start;
}
.mood-picker-date { font-size: 32px; font-family: 'Ma Shan Zheng', cursive; }
.mood-picker-weekday { font-size: 14px; color: var(--ink-light); margin-top: 2px; font-family: 'Caveat', cursive; }
.mood-picker-close {
  background: #fff; border: 1px dashed var(--ink-faint);
  color: var(--ink-light); width: 30px; height: 30px;
  border-radius: 50%; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.mood-picker-prompt {
  text-align: center; font-size: 17px;
  padding: 28px 0 24px; color: var(--ink-light);
  font-family: 'Ma Shan Zheng', cursive;
}
.mood-picker-grid {
  flex: 1; display: flex; flex-wrap: wrap;
  justify-content: center; align-content: center;
  gap: 14px; padding: 0 20px;
}
.mood-option {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; cursor: pointer; transition: transform 0.2s; width: 72px;
}
.mood-option:active { transform: scale(0.88) rotate(-3deg); }
.mood-option .mood-circle {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px dashed transparent; transition: all 0.2s;
  background: #fff; box-shadow: var(--shadow);
}
.mood-option .mood-circle svg { width: 40px; height: 40px; }
.mood-option .mood-label {
  font-size: 13px; color: var(--ink-light); font-family: 'Ma Shan Zheng', cursive;
}

/* ===== Entry Input — journal entry ===== */
.entry-input {
  position: absolute; inset: 0; z-index: 200;
  background: var(--paper); display: none; flex-direction: column;
}
.entry-input.active { display: flex; }
.entry-input-header {
  padding: 56px 20px 12px; display: flex;
  justify-content: space-between; align-items: center;
}
.entry-input-header .back-btn {
  background: none; border: none; color: var(--ink-light);
  font-size: 15px; cursor: pointer; font-family: 'Ma Shan Zheng', cursive;
}
.entry-input-header .save-btn {
  background: var(--pink); border: none; color: #fff;
  font-size: 14px; padding: 7px 20px; border-radius: 12px; cursor: pointer;
  font-family: 'Ma Shan Zheng', cursive;
}
.entry-input-card {
  margin: 12px 20px; border-radius: 4px;
  background: #fff; border: 1px dashed var(--ink-faint);
  padding: 20px; flex: 1; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
}
.entry-input-date { font-size: 12px; color: var(--ink-light); margin-bottom: 16px; font-family: 'Caveat', cursive; }
.entry-input-mood { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
.entry-input-mood .mood-big { width: 56px; height: 56px; margin-bottom: 6px; }
.entry-input-mood .mood-big svg { width: 100%; height: 100%; }
.entry-input-mood .mood-tag {
  font-size: 12px; padding: 3px 12px; border-radius: 8px;
  font-family: 'Ma Shan Zheng', cursive;
}
.entry-input textarea {
  flex: 1; background: none; border: none; color: var(--ink);
  font-size: 16px; line-height: 24px; resize: none; outline: none;
  font-family: 'Ma Shan Zheng', cursive;
  background-image: repeating-linear-gradient(transparent, transparent 23px, var(--paper-line) 23px, var(--paper-line) 24px);
}
.entry-input textarea::placeholder { color: var(--ink-faint); }

/* ===== Day Detail — sticky note style ===== */
.day-detail {
  position: absolute; inset: 0; z-index: 200;
  background: var(--paper); display: none; flex-direction: column;
}
.day-detail.active { display: flex; }
.day-detail-header {
  padding: 56px 20px 12px; display: flex;
  justify-content: space-between; align-items: center;
}
.day-detail-header .back-btn {
  background: none; border: none; color: var(--ink-light);
  font-size: 15px; cursor: pointer; font-family: 'Ma Shan Zheng', cursive;
}
.day-detail-content {
  flex: 1; overflow-y: auto; padding: 0 20px 40px;
  -webkit-overflow-scrolling: touch;
}
.detail-date-big { font-size: 36px; font-family: 'Ma Shan Zheng', cursive; }
.detail-weekday { font-size: 14px; color: var(--ink-light); margin-bottom: 20px; font-family: 'Caveat', cursive; }
.detail-entry {
  background: #fff; border-radius: 12px;
  padding: 16px; margin-bottom: 12px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow);
}
.detail-entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.detail-entry-avatar { width: 30px; height: 30px; }
.detail-entry-avatar svg { width: 100%; height: 100%; }
.detail-entry-name { font-size: 15px; font-family: 'Ma Shan Zheng', cursive; }
.detail-entry-name.user { color: var(--pink); }
.detail-entry-name.npc { color: var(--blue); }
.detail-entry-mood-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 6px;
  font-family: 'Ma Shan Zheng', cursive; margin-left: auto;
}
.detail-entry-text {
  font-size: 15px; line-height: 1.7; color: var(--ink-light);
  font-family: 'Ma Shan Zheng', cursive;
}
.detail-entry.locked .detail-entry-text { filter: blur(6px); user-select: none; }
.detail-lock-overlay {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(253,246,236,0.8); border-radius: 4px;
}
.detail-lock-icon { font-size: 22px; margin-bottom: 6px; }
.detail-lock-text { font-size: 13px; color: var(--ink-light); margin-bottom: 8px; font-family: 'Ma Shan Zheng', cursive; }
.detail-unlock-btn {
  background: var(--pink); border: none; color: #fff;
  font-size: 13px; padding: 7px 16px; border-radius: 10px; cursor: pointer;
  font-family: 'Ma Shan Zheng', cursive;
}

/* ===== Summary Page — journal spread ===== */
.summary-page {
  position: absolute; inset: 0; z-index: 200;
  background: var(--paper); display: none; flex-direction: column;
}
.summary-page.active { display: flex; }
.summary-header {
  padding: 56px 20px 12px; display: flex;
  justify-content: space-between; align-items: center;
}
.summary-header .back-btn {
  background: none; border: none; color: var(--ink-light);
  font-size: 15px; cursor: pointer; font-family: 'Ma Shan Zheng', cursive;
}
.summary-title {
  font-size: 18px; font-family: 'Ma Shan Zheng', cursive; color: var(--ink);
}
.summary-content {
  flex: 1; overflow-y: auto; padding: 0 16px 40px;
  -webkit-overflow-scrolling: touch;
}

/* Mood Jar — mason jar sketch */
.mood-jar-wrap { display: flex; justify-content: center; padding: 10px 0 16px; }
.mood-jar { width: 220px; height: 300px; position: relative; }
.mood-jar .jar-outline {
  position: absolute; inset: 0;
  border: 2px dashed var(--ink-faint);
  border-radius: 8px 8px 40px 40px;
  background: rgba(255,255,255,0.5);
}
.mood-jar .jar-lid {
  position: absolute; top: -10px; left: 30px; right: 30px;
  height: 14px; border-radius: 4px 4px 0 0;
  background: var(--paper-deep);
  border: 2px dashed var(--ink-faint); border-bottom: none;
}
.mood-jar .jar-shine {
  position: absolute; top: 18px; left: 16px; width: 4px; height: 50px;
  border-radius: 2px; background: rgba(255,255,255,0.5);
  transform: rotate(-3deg);
}
.mood-jar .jar-balls {
  position: absolute; bottom: 10px; left: 10px; right: 10px; top: 18px;
  overflow: hidden;
}
.mood-jar .jar-ball {
  width: 22px; height: 22px; display: flex;
  align-items: center; justify-content: center;
  position: absolute;
  animation: jarDrop 0.5s ease-out forwards; opacity: 0;
}
.mood-jar .jar-ball svg { width: 100%; height: 100%; }
@keyframes jarDrop {
  0% { opacity: 0; transform: translateY(var(--drop-y, -200px)) rotate(0deg) scale(0.5); }
  15% { opacity: 1; }
  70% { transform: translateY(8px) rotate(var(--rot, 0deg)) scale(1.05); }
  85% { transform: translateY(-3px) rotate(var(--rot, 0deg)) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) rotate(var(--rot, 0deg)) scale(1); }
}

.summary-section-title {
  font-size: 15px; margin: 12px 0 6px; color: var(--ink);
  font-family: 'Ma Shan Zheng', cursive;
}
.summary-stats { display: flex; gap: 8px; }
.summary-stat-card {
  flex: 1; background: #fff;
  border-radius: 10px;
  padding: 8px 10px; display: flex; align-items: center; gap: 6px;
  box-shadow: var(--shadow);
}
.summary-stat-card .stat-who { font-size: 12px; font-family: 'Ma Shan Zheng', cursive; white-space: nowrap; }
.summary-stat-card .stat-mood { width: 26px; height: 26px; flex-shrink: 0; }
.summary-stat-card .stat-mood svg { width: 100%; height: 100%; }
.summary-stat-card .stat-label { font-size: 12px; font-family: 'Ma Shan Zheng', cursive; }
.summary-stat-card .stat-count { font-size: 11px; color: var(--ink-light); margin-left: auto; font-family: 'Caveat', cursive; }

.trend-chart {
  background: #fff;
  border-radius: 10px; padding: 12px; margin-top: 8px;
  box-shadow: var(--shadow);
}
.trend-legend {
  display: flex; gap: 14px; margin-bottom: 8px; font-size: 11px;
  font-family: 'Ma Shan Zheng', cursive;
}
.trend-legend span { display: flex; align-items: center; gap: 4px; color: var(--ink-light); }
.trend-legend .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.trend-legend .leg-dot.user { background: var(--pink); }
.trend-legend .leg-dot.npc { background: var(--blue); }
.trend-canvas { width: 100%; height: 200px; }
.trend-chart-wrap { display: flex; gap: 0; align-items: stretch; }
.trend-y-axis {
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 6px 3px 24px 0; width: 22px; flex-shrink: 0;
}
.trend-y-axis .y-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }
.trend-y-axis .y-icon svg { width: 100%; height: 100%; }
.trend-canvas-wrap { flex: 1; min-width: 0; }

::-webkit-scrollbar { display: none; }

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.slide-up { animation: slideUp 0.28s ease-out; }
</style>
</head>
<body>

<!-- Calendar Page -->
<div class="page active" id="calPage">
  <div class="status-bar"></div>
  <div class="npc-banner">
    <div class="npc-avatar-wrap">
      <div class="npc-bubble">今天过得怎么样？✨</div>
      <img class="npc-avatar" src="https://xingyeai-images-cdn.oss-cn-shanghai.aliyuncs.com/talkie-user-img/148772284551305/354206459928687.jpeg" alt="江晦"
        onerror="this.style.background='linear-gradient(135deg,#E89AAF,#7BA3C9)';this.style.fontSize='24px';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.textContent='🌟';">
    </div>
    <div class="npc-banner-info">
      <div class="npc-banner-title">Eureka & 江晦 心情日记 📖</div>
      <div class="npc-banner-days">已记录 <span class="day-count" id="totalDays">0</span> 天</div>
    </div>
  </div>
  <div class="cal-header">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-title" id="monthTitle"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <button class="summary-btn" onclick="showSummary()" title="月度总结">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="1,12 4,6 7,9 10,3 13,7 15,4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="1" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1" opacity="0.4"/>
      </svg>
    </button>
  </div>
  <div class="cal-legend">
    <span><span class="leg-icon" id="legendMoon"></span>我</span>
    <span><span class="leg-icon" id="legendStar"></span>江晦</span>
  </div>
  <div class="cal-weekdays">
    <span>一</span><span>二</span><span>三</span><span>四</span>
    <span>五</span><span>六</span><span>日</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <button class="fab-write" onclick="fabWrite()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
    </svg>
  </button>
</div>

<!-- Backfill Pay Dialog -->
<div class="backfill-dialog" id="backfillDialog">
  <div class="backfill-card">
    <div class="bf-title">📝 补签心情</div>
    <div class="bf-desc" id="backfillDesc">补写过去的心情需要 💎100</div>
    <div class="bf-btns">
      <button class="bf-btn cancel" onclick="closeBackfill()">算了</button>
      <button class="bf-btn pay" onclick="confirmBackfill()">💎 100 补签</button>
    </div>
  </div>
</div>

<!-- Mood Picker -->
<div class="mood-picker" id="moodPicker">
  <div class="mood-picker-header">
    <div>
      <div class="mood-picker-date" id="pickerDate"></div>

// ===== Config =====

// ===== SVG Mood Icons =====

}

      <circle cx="28" cy="22" r="0.8" fill="#fff" opacity="0.6"/>

  return f[mood] || f.calm;
}

// ===== Mood Definitions =====
const MOODS = [
  { id: 'happy',     label: '开心' },
  { id: 'heartbeat', label: '心动' },
  { id: 'excited',   label: '兴奋' },
  { id: 'calm',      label: '平静' },
  { id: 'tired',     label: '心累' },
  { id: 'angry',     label: '生气' },
  { id: 'irritated', label: '烦躁' },
  { id: 'sad',       label: '伤心' },
];

function getMood(id) { return MOODS.find(m => m.id === id) || MOODS[0]; }
function randomMood() { return MOODS[Math.floor(Math.random() * MOODS.length)]; }

// Hollow/outline icons for empty days - pencil sketch style
function moonOutlineSVG(size) {
  return `<svg viewBox="0 0 48 48" width="${size||48}" height="${size||48}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="18" fill="none" stroke="rgba(90,74,58,0.15)" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="32" cy="16" r="12" fill="none" stroke="rgba(90,74,58,0.08)" stroke-width="1" stroke-dasharray="2,2"/>
  </svg>`;
}
function starOutlineSVG(size) {
  return `<svg viewBox="0 0 48 48" width="${size||48}" height="${size||48}" xmlns="http://www.w3.org/2000/svg">
    <path d="M24 6 L28.5 17.5 L41 19 L32 27.5 L34 40 L24 34.5 L14 40 L16 27.5 L7 19 L19.5 17.5Z"
      fill="none" stroke="rgba(90,74,58,0.15)" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="3,2"/>
  </svg>`;
}

// ===== Mock Data =====
function generateMockData() {
  const data = {};
  const now = new Date();
  for (let i = 1; i <= 60; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const key = dateKey(d);
    const userTexts = [
      '今天工作好累，但晚上和朋友吃了火锅，开心！',
      '一个人逛了书店，买了两本新书📚',
      '下雨了，窝在家里看电影，很惬意',
      '被领导表扬了，心情超好！',
      '和闺蜜视频聊了好久，想她了',
      '今天什么也不想做，就想躺着…',
      '学会了一道新菜！虽然卖相不太行哈哈',
      '刷到一个好笑的视频，笑了好半天',
      '加班到好晚，有点疲惫',
      '周末终于到了！睡到自然醒的感觉真好',
    ];
    const npcTexts = [
      '看你今天笑得很开心，我也跟着高兴了',
      '下雨了记得带伞，别让自己淋湿',
      '你今天的穿搭很好看',
      '辛苦了，给你泡杯热茶吧',
      '发现你最近很努力，但也要注意休息',
      '想和你一起去看海',
      '你不开心的时候，可以来找我',
      '我今天看了一本你推荐的书，很喜欢',
      '早点休息，不想看到你有黑眼圈',
      '不管怎样，我都在',
    ];
    data[key] = {
      user: { mood: randomMood().id, text: userTexts[Math.floor(Math.random() * userTexts.length)] },
      npc: { mood: randomMood().id, text: npcTexts[Math.floor(Math.random() * npcTexts.length)], locked: Math.random() > 0.4 }
    };
  }
  return data;
}

const diaryData = generateMockData();

// ===== State =====
let currentYear, currentMonth, selectedMoodId = null, writingDateKey = null;

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ===== Day Count with Bounce =====
let lastDayCount = 0;
function updateDayCount(count) {
  const el = document.getElementById('totalDays');
  el.textContent = count;
  if (count !== lastDayCount && lastDayCount > 0) {
    el.classList.remove('bounce');
    void el.offsetWidth; // force reflow
    el.classList.add('bounce');
  }
  lastDayCount = count;
}

// ===== Calendar =====
function renderCalendar() {
  document.getElementById('monthTitle').textContent = `${currentYear}年${currentMonth+1}月`;
  updateDayCount(Object.keys(diaryData).length);

  // Legend icons
  document.getElementById('legendMoon').innerHTML = moonSVG('calm', 14);
  document.getElementById('legendStar').innerHTML = starSVG('calm', 14);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today);

  for (let i = 0; i < startDow; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const key = dateKey(date);
    const isToday = key === todayKey;
    const entry = diaryData[key];

    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isToday ? ' today' : '');

    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const isFuture = date > today && !isToday;
    if (entry) {
      const moodsWrap = document.createElement('div');
      moodsWrap.className = 'day-moods';

      const userIcon = document.createElement('div');
      userIcon.className = 'day-mood-icon';
      userIcon.innerHTML = moonSVG(entry.user.mood, 26);
      moodsWrap.appendChild(userIcon);

      const npcIcon = document.createElement('div');
      npcIcon.className = 'day-mood-icon';
      npcIcon.innerHTML = starSVG(entry.npc.mood, 26);
      moodsWrap.appendChild(npcIcon);

      cell.appendChild(moodsWrap);
      cell.onclick = () => showDayDetail(key, date);
    } else if (!isFuture) {
      // Show hollow outline icons for empty past/today days
      const moodsWrap = document.createElement('div');
      moodsWrap.className = 'day-moods';
      const emptyMoon = document.createElement('div');
      emptyMoon.className = 'day-mood-icon empty-icon';
      emptyMoon.innerHTML = moonOutlineSVG(26);
      moodsWrap.appendChild(emptyMoon);
      const emptyStar = document.createElement('div');
      emptyStar.className = 'day-mood-icon empty-icon';
      emptyStar.innerHTML = starOutlineSVG(26);
      moodsWrap.appendChild(emptyStar);
      cell.appendChild(moodsWrap);
      // Click empty past day to write (with pay for past)
      cell.onclick = () => handleDayWrite(key, date, isToday);
    }
    grid.appendChild(cell);
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

// ===== FAB & Write Logic =====
let pendingBackfillKey = null, pendingBackfillDate = null;

function fabWrite() {
  // Default to today
  const today = new Date();
  const key = dateKey(today);
  if (diaryData[key]?.user) {
    // Already written today — show detail instead
    showDayDetail(key, today);
    return;
  }
  openMoodPicker(key, today);
}

function handleDayWrite(key, date, isToday) {
  if (diaryData[key]?.user) {
    showDayDetail(key, date);
    return;
  }
  if (isToday) {
    openMoodPicker(key, date);
  } else {
    // Past day — need to pay 💎100
    pendingBackfillKey = key;
    pendingBackfillDate = date;
    document.getElementById('backfillDesc').textContent =
      `补写 ${date.getMonth()+1}月${date.getDate()}日 的心情需要 💎100`;
    document.getElementById('backfillDialog').classList.add('active');
  }
}

function closeBackfill() {
  document.getElementById('backfillDialog').classList.remove('active');
  pendingBackfillKey = null; pendingBackfillDate = null;
}

function confirmBackfill() {
  closeBackfill();
  if (pendingBackfillKey && pendingBackfillDate) {
    openMoodPicker(pendingBackfillKey, pendingBackfillDate);
  }
}

// ===== Mood Picker =====
function openMoodPicker(key, date) {
  writingDateKey = key;
  document.getElementById('pickerDate').textContent = `${date.getMonth()+1}月${date.getDate()}日`;
  document.getElementById('pickerWeekday').textContent = `星期${WEEKDAYS[date.getDay()]}`;
  const grid = document.getElementById('moodGrid');
  grid.innerHTML = '';
  MOODS.forEach(m => {
    const opt = document.createElement('div');
    opt.className = 'mood-option';
    const c = MOOD_COLORS[m.id];
    opt.innerHTML = `
      <div class="mood-circle" style="background:${c}10; border-color:${c}30;">
        ${moonSVG(m.id, 42)}
      </div>
      <span class="mood-label" style="color:${c};">${m.label}</span>
    `;
    opt.onclick = () => selectMood(m.id);
    grid.appendChild(opt);
  });
  document.getElementById('moodPicker').classList.add('active','slide-up');
}
function closeMoodPicker() { document.getElementById('moodPicker').classList.remove('active','slide-up'); }
function selectMood(id) { selectedMoodId = id; closeMoodPicker(); openEntryInput(); }

// ===== Entry Input =====
function openEntryInput() {
  const m = getMood(selectedMoodId);
  const c = MOOD_COLORS[selectedMoodId];
  document.getElementById('inputDate').textContent = writingDateKey;
  document.getElementById('inputMood').innerHTML = `
    <div class="mood-big">${moonSVG(selectedMoodId, 56)}</div>
    <span class="mood-tag" style="background:${c}18; color:${c};">${m.label}</span>
  `;
  document.getElementById('inputText').value = '';
  document.getElementById('entryInput').classList.add('active','slide-up');
  setTimeout(() => document.getElementById('inputText').focus(), 350);
}
function closeEntryInput() { document.getElementById('entryInput').classList.remove('active','slide-up'); }

function saveEntry() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;
  if (!diaryData[writingDateKey]) diaryData[writingDateKey] = {};
  diaryData[writingDateKey].user = { mood: selectedMoodId, text };
  const npcMood = randomMood();
  const replies = ['看到你写的，我也想说点什么','今天也辛苦了','不管怎样，我都在','你的心情我感受到了','想给你一个拥抱'];
  diaryData[writingDateKey].npc = { mood: npcMood.id, text: replies[Math.floor(Math.random()*replies.length)], locked: false };
  closeEntryInput(); renderCalendar();
}

// ===== Day Detail =====
function showDayDetail(key, date) {
  const entry = diaryData[key]; if (!entry) return;
  const content = document.getElementById('detailContent');
  const weekday = `星期${WEEKDAYS[date.getDay()]}`;
  let html = `<div class="detail-date-big">${date.getDate()}日</div>
    <div class="detail-weekday">${date.getFullYear()}年${date.getMonth()+1}月 · ${weekday}</div>`;

  if (entry.user) {
    const m = getMood(entry.user.mood); const c = MOOD_COLORS[entry.user.mood];
    html += `<div class="detail-entry">
      <div class="detail-entry-header">
        <div class="detail-entry-avatar">${moonSVG(entry.user.mood, 32)}</div>
        <span class="detail-entry-name user">${USER_NAME}</span>
        <span class="detail-entry-mood-tag" style="background:${c}18; color:${c};">${m.label}</span>
      </div>
      <div class="detail-entry-text">${entry.user.text}</div>
    </div>`;
  }

  if (entry.npc) {
    const m = getMood(entry.npc.mood); const c = MOOD_COLORS[entry.npc.mood];
    const locked = entry.npc.locked;
    html += `<div class="detail-entry${locked?' locked':''}">
      <div class="detail-entry-header">
        <div class="detail-entry-avatar">${starSVG(entry.npc.mood, 32)}</div>
        <span class="detail-entry-name npc">${NPC_NAME}</span>
        <span class="detail-entry-mood-tag" style="background:${c}18; color:${c};">${m.label}</span>
      </div>
      <div class="detail-entry-text">${entry.npc.text}</div>
      ${locked?`<div class="detail-lock-overlay">
        <span class="detail-lock-icon">🔒</span>
        <span class="detail-lock-text">${NPC_NAME}的心情还未解锁</span>
        <button class="detail-unlock-btn" onclick="unlockEntry('${key}')">💎 100 解锁</button>
      </div>`:''}
    </div>`;
  }
  content.innerHTML = html;
  document.getElementById('dayDetail').classList.add('active','slide-up');
}
function closeDayDetail() { document.getElementById('dayDetail').classList.remove('active','slide-up'); }
function unlockEntry(key) {
  if (diaryData[key]?.npc) { diaryData[key].npc.locked = false; const d = new Date(key+'T00:00:00'); showDayDetail(key, d); }
}

// ===== Summary =====
function showSummary() {
  document.getElementById('summaryTitle').textContent = `${currentYear}年${currentMonth+1}月`;
  const content = document.getElementById('summaryContent');
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const userMoods=[], npcMoods=[], userCount={}, npcCount={}, userDay=[], npcDay=[];

  for (let d=1; d<=daysInMonth; d++) {
    const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = diaryData[key];
    if (entry) {
      if (entry.user) { userMoods.push(entry.user.mood); userCount[entry.user.mood]=(userCount[entry.user.mood]||0)+1; userDay.push({day:d,mood:entry.user.mood}); }
      if (entry.npc) { npcMoods.push(entry.npc.mood); npcCount[entry.npc.mood]=(npcCount[entry.npc.mood]||0)+1; npcDay.push({day:d,mood:entry.npc.mood}); }
    }
  }

  const userTop = Object.entries(userCount).sort((a,b)=>b[1]-a[1])[0];
  const npcTop = Object.entries(npcCount).sort((a,b)=>b[1]-a[1])[0];

  // Jar - natural gravity stacking (heap shape, center-heavy like reference)
  const allMoods = [...userMoods.map(m=>({m,type:'moon'})), ...npcMoods.map(m=>({m,type:'star'}))];
  for (let i = allMoods.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allMoods[i], allMoods[j]] = [allMoods[j], allMoods[i]];
  }
  const jarW = 200, jarH = 270, bs = 18;
  const balls = []; // {cx, cy}
  
  // Natural scatter layout — like real balls dropped into a jar
  const jarMoods = allMoods.slice(0, 62);
  const iconSize = 20;
  const placed = []; // {x, y} bottom-left positions
  
  function tryPlace() {
    // Random x, biased toward center
    const r = (Math.random() + Math.random()) / 2;
    const x = 6 + r * (jarW - iconSize - 12);
    // Find the lowest available y at this x
    let y = 8; // start from jar bottom
    for (const p of placed) {
      // Check if horizontally overlapping
      if (Math.abs((x + iconSize/2) - (p.x + iconSize/2)) < iconSize * 0.88) {
        // Stack on top
        const topY = p.y + iconSize * 0.78 + Math.random() * 2;
        if (topY > y) y = topY;
      }
    }
    return { x, y };
  }
  
  let jarHtml = '';
  jarMoods.forEach((item, i) => {
    // Try several positions, pick the lowest (gravity)
    let best = null;
    for (let t = 0; t < 10; t++) {
      const pos = tryPlace();
      if (!best || pos.y < best.y) best = pos;
    }
    // Add small jitter for organic feel
    best.x += (Math.random() - 0.5) * 5;
    best.x = Math.max(3, Math.min(jarW - iconSize - 3, best.x));
    placed.push(best);
    
    const rot = (Math.random() - 0.5) * 40;
    const scale = 0.85 + Math.random() * 0.2;
    const svg = item.type === 'moon' ? moonSVG(item.m, iconSize) : starSVG(item.m, iconSize);
    const dropDist = -(jarH - best.y + 40);
    jarHtml += `<div class="jar-ball" style="left:${best.x.toFixed(1)}px;bottom:${best.y.toFixed(1)}px;--rot:${rot.toFixed(0)}deg;--drop-y:${dropDist}px;animation-delay:${(i*0.05).toFixed(2)}s;animation-duration:0.5s;">${svg}</div>`;
  });

  let html = `<div class="mood-jar-wrap"><div class="mood-jar">
    <div class="jar-lid"></div><div class="jar-outline"></div><div class="jar-shine"></div>
    <div class="jar-balls">${jarHtml}</div></div></div>`;

  // 本月最多心情 — compact horizontal layout: name + icon + label + count
  html += `<div class="summary-section-title">本月最多心情</div><div class="summary-stats">`;
  if (userTop) {
    const m = getMood(userTop[0]); const c = MOOD_COLORS[userTop[0]];
    html += `<div class="summary-stat-card">
      <span class="stat-who" style="color:#E89AAF;">${USER_NAME}</span>
      <div class="stat-mood">${moonSVG(userTop[0],28)}</div>
      <span class="stat-label" style="color:${c};">${m.label}</span>
      <span class="stat-count">×${userTop[1]}</span></div>`;
  }
  if (npcTop) {
    const m = getMood(npcTop[0]); const c = MOOD_COLORS[npcTop[0]];
    html += `<div class="summary-stat-card">
      <span class="stat-who" style="color:#7BA3C9;">${NPC_NAME}</span>
      <div class="stat-mood">${starSVG(npcTop[0],28)}</div>
      <span class="stat-label" style="color:${c};">${m.label}</span>
      <span class="stat-count">×${npcTop[1]}</span></div>`;
  }
  html += `</div>`;

  // 心情趋势 — Y-axis mood icons, pink/blue dot legend
  const yAxisMoods = ['excited','heartbeat','happy','calm','tired','irritated','angry','sad'];
  let yAxisHtml = '';
  yAxisMoods.forEach(mid => {
    yAxisHtml += `<div class="y-icon">${moonSVG(mid, 16)}</div>`;
  });
  html += `<div class="summary-section-title">心情趋势</div>
    <div class="trend-chart">
      <div class="trend-legend">
        <span><span class="leg-dot user"></span>${USER_NAME}</span>
        <span><span class="leg-dot npc"></span>${NPC_NAME}</span>
      </div>
      <div class="trend-chart-wrap">
        <div class="trend-y-axis">${yAxisHtml}</div>
        <div class="trend-canvas-wrap"><canvas class="trend-canvas" id="trendCanvas"></canvas></div>
      </div>
    </div>`;

  content.innerHTML = html;
  document.getElementById('summaryPage').classList.add('active','slide-up');
  setTimeout(() => drawTrend(userDay, npcDay, daysInMonth), 80);
}
function closeSummary() { document.getElementById('summaryPage').classList.remove('active','slide-up'); }

// 0=sad(bottom) to 7=excited(top), matching Y-axis icon order
function moodVal(id) { return {excited:7,heartbeat:6,happy:5,calm:4,tired:3,irritated:2,angry:1,sad:0}[id]??3; }

function drawTrend(uDay, nDay, days) {
  const canvas = document.getElementById('trendCanvas'); if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*dpr; canvas.height = rect.height*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const W=rect.width, H=rect.height, pL=4, pR=8, pT=8, pB=28;
  const cW=W-pL-pR, cH=H-pT-pB;

  // Horizontal grid lines for each mood level (8 levels, 0-7)
  ctx.strokeStyle='rgba(90,74,58,0.06)'; ctx.lineWidth=1;
  for(let i=0;i<=7;i++){
    const y=pT+(cH/7)*i;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();
  }

  // X-axis date labels: 1, 5, 10, 15, 20, 25, 30
  const xDates = [1, 5, 10, 15, 20, 25, 30].filter(d => d <= days);
  ctx.fillStyle = 'rgba(90,74,58,0.35)';
  ctx.font = '11px Caveat, cursive';
  ctx.textAlign = 'center';
  xDates.forEach(d => {
    const x = pL + ((d - 1) / (days - 1)) * cW;
    ctx.fillText(d, x, H - 6);
    ctx.strokeStyle = 'rgba(90,74,58,0.08)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, pT + cH); ctx.lineTo(x, pT + cH + 4); ctx.stroke();
  });

  function drawLine(dms, color) {
    if(dms.length<2) return;
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round';
    dms.forEach((dm,i) => {
      const x = pL+((dm.day-1)/(days-1))*cW;
      const y = pT+cH-(moodVal(dm.mood)/7)*cH;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Glow
    ctx.strokeStyle = color + '30'; ctx.lineWidth = 4;
    ctx.beginPath();
    dms.forEach((dm,i) => {
      const x = pL+((dm.day-1)/(days-1))*cW;
      const y = pT+cH-(moodVal(dm.mood)/7)*cH;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  drawLine(uDay, '#E89AAF');
  drawLine(nDay, '#7BA3C9');
}

// ===== Init =====
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
renderCalendar();
</script>

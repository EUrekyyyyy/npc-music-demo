<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心情日记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0B0E1A;
  --bg-card: #131829;
  --bg-elevated: #1A2035;
  --bg-modal: #0D1020;
  --text-primary: #E8ECF4;
  --text-secondary: rgba(232,236,244,0.50);
  --text-tertiary: rgba(232,236,244,0.25);
  --accent: #6E8EFA;
  --accent-soft: rgba(110,142,250,0.10);
  --user-accent: #C4B5FD;
  --npc-accent: #67B2FF;
  --border: rgba(255,255,255,0.05);
  --glass: rgba(255,255,255,0.03);
  /* NPC theme - 江晦 cool blue */
  --npc-theme: #4A90D9;
  --npc-theme-soft: rgba(74,144,217,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  width: 390px; height: 844px;
  overflow: hidden; position: relative; margin: 0 auto;
  background-image:
    radial-gradient(ellipse at 80% 0%, rgba(74,144,217,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 100%, rgba(110,142,250,0.04) 0%, transparent 60%);
}

/* ===== Mood Colors ===== */
:root {
  --c-happy: #FFBA5C;
  --c-heartbeat: #FF7EB3;
  --c-excited: #FFD93D;
  --c-calm: #7EC8A0;
  --c-tired: #8E8EA0;
  --c-angry: #FF6B6B;
  --c-irritated: #A78BFA;
  --c-sad: #6BAFFF;
}

/* ===== Status Bar (removed time, just spacing) ===== */
.status-bar {
  height: 48px;
}

/* ===== Pages ===== */
.page { position: absolute; inset: 0; display: none; flex-direction: column; }
.page.active { display: flex; }

/* ===== NPC Header Banner ===== */
.npc-banner {
  position: relative; overflow: visible;
  margin: 0 16px; border-radius: 16px;
  background: linear-gradient(135deg, #1a2a4a 0%, #0f1a30 100%);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  padding: 18px 20px 18px 20px;
  display: flex; align-items: center; gap: 14px;
}
.npc-avatar-wrap {
  position: relative; flex-shrink: 0;
}
.npc-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  object-fit: cover; border: 2px solid rgba(103,178,255,0.3);
  background: var(--bg-elevated);
}
/* Speech bubble */
.npc-bubble {
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: rgba(103,178,255,0.15); border: 1px solid rgba(103,178,255,0.2);
  border-radius: 10px; padding: 5px 10px;
  font-size: 10px; color: var(--npc-accent); white-space: nowrap;
  margin-bottom: 6px;
  animation: bubbleFloat 3s ease-in-out infinite;
}
.npc-bubble::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: rgba(103,178,255,0.2);
}
@keyframes bubbleFloat {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-3px); }
}
.npc-banner-info {
  flex: 1; min-width: 0;
}
.npc-banner-title {
  font-size: 17px; font-weight: 700; margin-bottom: 6px;
  background: linear-gradient(135deg, #C4B5FD, #67B2FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.npc-banner-days {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(110,142,250,0.12); border-radius: 10px;
  padding: 4px 12px; font-size: 12px; color: var(--accent);
}
.npc-banner-days .day-count {
  font-weight: 800; font-size: 16px;
  background: linear-gradient(135deg, #C4B5FD, #67B2FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  display: inline-block; transition: transform 0.3s;
}
.npc-banner-days .day-count.bounce {
  animation: dayBounce 0.6s ease;
}
@keyframes dayBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.4) translateY(-4px); }
  50% { transform: scale(0.9); }
  70% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* ===== Calendar ===== */
.cal-header {
  padding: 0 20px 10px; display: flex;
  align-items: center; justify-content: space-between;
}
.cal-header .month-nav {
  display: flex; align-items: center; gap: 14px;
}
.cal-header .month-nav button {
  background: none; border: none; color: var(--text-secondary);
  font-size: 18px; padding: 4px 6px; cursor: pointer;
}
.cal-header .month-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
.cal-header .summary-btn {
  background: var(--accent-soft); border: 1px solid rgba(110,142,250,0.15);
  color: var(--accent); font-size: 11px; padding: 5px 12px;
  border-radius: 14px; cursor: pointer;
}

.cal-legend {
  display: flex; justify-content: center; gap: 20px;
  padding: 0 20px 8px; font-size: 11px;
}
.cal-legend span { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); }
.cal-legend .leg-icon { width: 14px; height: 14px; }

.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 12px; margin-bottom: 4px;
}
.cal-weekdays span {
  text-align: center; font-size: 10px; color: var(--text-tertiary);
  font-weight: 600; letter-spacing: 1px;
}

.cal-grid {
  flex: 1; overflow-y: auto; padding: 0 8px 20px;
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; align-content: start;
  -webkit-overflow-scrolling: touch;
}

.cal-day {
  display: flex; flex-direction: column; align-items: center;
  padding: 5px 0; cursor: pointer; border-radius: 10px;
  transition: background 0.15s; min-height: 72px;
}
.cal-day:active { background: var(--glass); }
.cal-day.empty { cursor: default; }
.cal-day.today .day-num {
  background: var(--accent); color: #fff; border-radius: 50%;
  width: 20px; height: 20px; display: flex; align-items: center;
  justify-content: center; font-size: 10px;
}
.day-num {
  font-size: 10px; color: var(--text-tertiary); margin-bottom: 3px;
  font-weight: 600;
}
.day-moods {
  display: flex; flex-direction: column; gap: 2px; align-items: center;
}
.day-mood-icon {
  width: 22px; height: 22px; display: flex;
  align-items: center; justify-content: center;
}
.day-mood-icon svg { width: 100%; height: 100%; }

.cal-day .write-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #5570E0);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; margin-top: 2px; border: none; cursor: pointer;
  box-shadow: 0 2px 14px rgba(110,142,250,0.35);
  color: #fff;
}

/* ===== Mood Picker ===== */
.mood-picker {
  position: absolute; inset: 0; z-index: 200;
  background: var(--bg-modal); display: none; flex-direction: column;
  background-image: radial-gradient(ellipse at 50% 30%, rgba(110,142,250,0.06) 0%, transparent 70%);
}
.mood-picker.active { display: flex; }
.mood-picker-header {
  padding: 60px 24px 0; display: flex;
  justify-content: space-between; align-items: flex-start;
}
.mood-picker-date { font-size: 32px; font-weight: 700; }
.mood-picker-weekday { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.mood-picker-close {
  background: var(--glass); border: 1px solid var(--border);
  color: var(--text-secondary); width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.mood-picker-prompt {
  text-align: center; font-size: 16px; font-weight: 500;
  padding: 32px 0 28px; color: var(--text-secondary);
}
.mood-picker-grid {
  flex: 1; display: flex; flex-wrap: wrap;
  justify-content: center; align-content: center;
  gap: 16px; padding: 0 24px;
}
.mood-option {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; cursor: pointer; transition: transform 0.2s;
  width: 76px;
}
.mood-option:active { transform: scale(0.88); }
.mood-option .mood-circle {
  width: 60px; height: 60px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid transparent; transition: all 0.2s;
  background: var(--glass);
}
.mood-option .mood-circle svg { width: 42px; height: 42px; }
.mood-option .mood-label {
  font-size: 12px; color: var(--text-secondary); font-weight: 500;
}

/* ===== Entry Input ===== */
.entry-input {
  position: absolute; inset: 0; z-index: 200;
  background: var(--bg-modal); display: none; flex-direction: column;
}
.entry-input.active { display: flex; }
.entry-input-header {
  padding: 60px 20px 16px; display: flex;
  justify-content: space-between; align-items: center;
}
.entry-input-header .back-btn {
  background: none; border: none; color: var(--text-secondary);
  font-size: 15px; cursor: pointer;
}
.entry-input-header .save-btn {
  background: linear-gradient(135deg, var(--accent), #5570E0);
  border: none; color: #fff; font-size: 13px; font-weight: 600;
  padding: 8px 22px; border-radius: 16px; cursor: pointer;
}
.entry-input-card {
  margin: 16px 20px; border-radius: 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; flex: 1; display: flex; flex-direction: column;
}
.entry-input-date { font-size: 13px; color: var(--text-tertiary); margin-bottom: 20px; }
.entry-input-mood {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 24px;
}
.entry-input-mood .mood-big { width: 56px; height: 56px; margin-bottom: 8px; }
.entry-input-mood .mood-big svg { width: 100%; height: 100%; }
.entry-input-mood .mood-tag {
  font-size: 12px; padding: 4px 14px; border-radius: 10px; font-weight: 500;
}
.entry-input textarea {
  flex: 1; background: none; border: none; color: var(--text-primary);
  font-size: 15px; line-height: 1.7; resize: none; outline: none;
  font-family: inherit;
}
.entry-input textarea::placeholder { color: var(--text-tertiary); }

/* ===== Day Detail ===== */
.day-detail {
  position: absolute; inset: 0; z-index: 200;
  background: var(--bg-modal); display: none; flex-direction: column;
}
.day-detail.active { display: flex; }
.day-detail-header {
  padding: 60px 20px 16px; display: flex;
  justify-content: space-between; align-items: center;
}
.day-detail-header .back-btn {
  background: none; border: none; color: var(--text-secondary);
  font-size: 15px; cursor: pointer;
}
.day-detail-content {
  flex: 1; overflow-y: auto; padding: 0 20px 40px;
  -webkit-overflow-scrolling: touch;
}
.detail-date-big { font-size: 36px; font-weight: 700; margin-bottom: 2px; }
.detail-weekday { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
.detail-entry {
  background: var(--bg-card); border-radius: 16px;
  border: 1px solid var(--border); padding: 20px; margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.detail-entry-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.detail-entry-avatar { width: 32px; height: 32px; }
.detail-entry-avatar svg { width: 100%; height: 100%; }
.detail-entry-name { font-size: 14px; font-weight: 600; }
.detail-entry-name.user { color: var(--user-accent); }
.detail-entry-name.npc { color: var(--npc-accent); }
.detail-entry-mood-tag {
  font-size: 11px; padding: 3px 10px; border-radius: 8px;
  font-weight: 500; margin-left: auto;
}
.detail-entry-text { font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
.detail-entry.locked .detail-entry-text { filter: blur(6px); user-select: none; }
.detail-lock-overlay {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(11,14,26,0.7); border-radius: 16px;
  backdrop-filter: blur(2px);
}
.detail-lock-icon { font-size: 24px; margin-bottom: 8px; }
.detail-lock-text { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.detail-unlock-btn {
  background: linear-gradient(135deg, var(--accent), #5570E0);
  border: none; color: #fff; font-size: 12px; font-weight: 600;
  padding: 8px 18px; border-radius: 14px; cursor: pointer;
}

/* ===== Summary Page ===== */
.summary-page {
  position: absolute; inset: 0; z-index: 200;
  background: var(--bg-modal); display: none; flex-direction: column;
}
.summary-page.active { display: flex; }
.summary-header {
  padding: 60px 20px 16px; display: flex;
  justify-content: space-between; align-items: center;
}
.summary-header .back-btn {
  background: none; border: none; color: var(--text-secondary);
  font-size: 15px; cursor: pointer;
}
.summary-title {
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #C4B5FD, #67B2FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.summary-content {
  flex: 1; overflow-y: auto; padding: 0 20px 40px;
  -webkit-overflow-scrolling: touch;
}

/* Mood Jar */
.mood-jar-wrap { display: flex; justify-content: center; padding: 16px 0 24px; }
.mood-jar { width: 220px; height: 300px; position: relative; }
.mood-jar .jar-outline {
  position: absolute; inset: 0;
  border: 1.5px solid rgba(110,142,250,0.18);
  border-radius: 10px 10px 36px 36px;
  background: rgba(110,142,250,0.02);
}
.mood-jar .jar-lid {
  position: absolute; top: -10px; left: 28px; right: 28px;
  height: 14px; border-radius: 5px 5px 0 0;
  background: rgba(110,142,250,0.10);
  border: 1.5px solid rgba(110,142,250,0.18); border-bottom: none;
}
.mood-jar .jar-shine {
  position: absolute; top: 16px; left: 14px; width: 6px; height: 60px;
  border-radius: 3px; background: rgba(255,255,255,0.04);
  transform: rotate(-4deg);
}
.mood-jar .jar-balls {
  position: absolute; bottom: 8px; left: 8px; right: 8px; top: 16px;
  overflow: hidden;
}
.mood-jar .jar-ball {
  width: 22px; height: 22px; display: flex;
  align-items: center; justify-content: center;
  position: absolute;
  animation: jarDrop 0.4s ease-out forwards; opacity: 0;
}
.mood-jar .jar-ball svg { width: 100%; height: 100%; }
@keyframes jarDrop {
  0% { opacity: 0; transform: translateY(var(--drop-y, -200px)) rotate(0deg) scale(0.6); }
  15% { opacity: 1; }
  70% { transform: translateY(8px) rotate(var(--rot, 0deg)) scale(1.05); }
  85% { transform: translateY(-3px) rotate(var(--rot, 0deg)) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) rotate(var(--rot, 0deg)) scale(1); }
}

.summary-section-title {
  font-size: 14px; font-weight: 600; margin: 20px 0 10px;
  color: var(--text-primary);
}
.summary-stats { display: flex; gap: 10px; }
.summary-stat-card {
  flex: 1; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.summary-stat-card .stat-who { font-size: 10px; color: var(--text-tertiary); font-weight: 600; letter-spacing: 0.5px; }
.summary-stat-card .stat-mood { width: 36px; height: 36px; }
.summary-stat-card .stat-mood svg { width: 100%; height: 100%; }
.summary-stat-card .stat-label { font-size: 12px; font-weight: 500; }
.summary-stat-card .stat-count { font-size: 11px; color: var(--text-tertiary); }

.trend-chart {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-top: 10px;
}
.trend-legend {
  display: flex; gap: 16px; margin-bottom: 10px; font-size: 10px;
}
.trend-legend span { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); }
.trend-legend .leg-icon { width: 12px; height: 12px; }
.trend-canvas { width: 100%; height: 220px; }
.trend-chart-wrap { display: flex; gap: 0; align-items: stretch; }
.trend-y-axis {
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 8px 4px 28px 0; width: 24px; flex-shrink: 0;
}
.trend-y-axis .y-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
.trend-y-axis .y-icon svg { width: 100%; height: 100%; }
.trend-canvas-wrap { flex: 1; min-width: 0; }

.mood-dist {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.mood-dist-tag {
  border-radius: 10px; padding: 6px 12px;
  display: flex; align-items: center; gap: 5px;
  border: 1px solid var(--border);
  background: var(--bg-card);
}
.mood-dist-tag .tag-icon { width: 18px; height: 18px; }
.mood-dist-tag .tag-icon svg { width: 100%; height: 100%; }
.mood-dist-tag .tag-label { font-size: 11px; }
.mood-dist-tag .tag-count { font-size: 10px; color: var(--text-tertiary); }

::-webkit-scrollbar { display: none; }

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.slide-up { animation: slideUp 0.28s ease-out; }
</style>
</head>
<body>

<!-- Calendar Page -->
<div class="page active" id="calPage">
  <div class="status-bar"></div>
  <div class="npc-banner">
    <div class="npc-avatar-wrap">
      <div class="npc-bubble">今天过得怎么样？</div>
      <img class="npc-avatar" src="https://xingyeai-images-cdn.oss-cn-shanghai.aliyuncs.com/talkie-user-img/148772284551305/354206459928687.jpeg" alt="江晦"
        onerror="this.style.background='linear-gradient(135deg,#4A90D9,#2A5A8A)';this.style.fontSize='28px';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.textContent='🌟';">
    </div>
    <div class="npc-banner-info">
      <div class="npc-banner-title">Eureka & 江晦 心情日记</div>
      <div class="npc-banner-days">已记录 <span class="day-count" id="totalDays">0</span> 天</div>
    </div>
  </div>
  <div class="cal-header">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-title" id="monthTitle"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <button class="summary-btn" onclick="showSummary()">月度总结</button>
  </div>
  <div class="cal-legend">
    <span><span class="leg-icon" id="legendMoon"></span>我</span>
    <span><span class="leg-icon" id="legendStar"></span>江晦</span>
  </div>
  <div class="cal-weekdays">
    <span>一</span><span>二</span><span>三</span><span>四</span>
    <span>五</span><span>六</span><span>日</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Mood Picker -->
<div class="mood-picker" id="moodPicker">
  <div class="mood-picker-header">
    <div>
      <div class="mood-picker-date" id="pickerDate"></div>
      <div class="mood-picker-weekday" id="pickerWeekday"></div>
    </div>
    <button class="mood-picker-close" onclick="closeMoodPicker()">✕</button>
  </div>
  <div class="mood-picker-prompt">今天的月亮是什么心情？🌙</div>
  <div class="mood-picker-grid" id="moodGrid"></div>
</div>

<!-- Entry Input -->
<div class="entry-input" id="entryInput">
  <div class="entry-input-header">
    <button class="back-btn" onclick="closeEntryInput()">‹ 返回</button>
    <button class="save-btn" onclick="saveEntry()">完成</button>
  </div>
  <div class="entry-input-card">
    <div class="entry-input-date" id="inputDate"></div>
    <div class="entry-input-mood" id="inputMood"></div>
    <textarea id="inputText" placeholder="记录此刻的心情..."></textarea>
  </div>
</div>

<!-- Day Detail -->
<div class="day-detail" id="dayDetail">
  <div class="day-detail-header">
    <button class="back-btn" onclick="closeDayDetail()">‹ 返回</button>
  </div>
  <div class="day-detail-content" id="detailContent"></div>
</div>

<!-- Summary Page -->
<div class="summary-page" id="summaryPage">
  <div class="summary-header">
    <button class="back-btn" onclick="closeSummary()">‹ 返回</button>
    <span class="summary-title" id="summaryTitle"></span>
    <span style="width:50px"></span>
  </div>
  <div class="summary-content" id="summaryContent"></div>
</div>

<script>
// ===== Config =====
const NPC_NAME = '江晦';
const USER_NAME = '栗川';

// ===== SVG Mood Icons =====
// Moon = User, Star = NPC
// Each mood has a color + face expression drawn on the shape

const MOOD_COLORS = {
  happy:     '#FFBA5C',
  heartbeat: '#FF7EB3',
  excited:   '#FFD93D',
  calm:      '#7EC8A0',
  tired:     '#8E8EA0',
  angry:     '#FF6B6B',
  irritated: '#A78BFA',
  sad:       '#6BAFFF',
};

// Moon shape path (crescent)
function moonSVG(moodId, size) {
  const c = MOOD_COLORS[moodId] || '#AAA';
  const face = moonFace(moodId);
  return `<svg viewBox="0 0 48 48" width="${size||48}" height="${size||48}" xmlns="http://www.w3.org/2000/svg">
    <!-- Crescent moon body -->
    <circle cx="24" cy="24" r="20" fill="${c}" opacity="0.9"/>

const diaryData = generateMockData();

// ===== State =====
let currentYear, currentMonth, selectedMoodId = null, writingDateKey = null;

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const WEEKDAYS = ['日','一','二','三','四','五','六'];

// ===== Day Count with Bounce =====
let lastDayCount = 0;
function updateDayCount(count) {
  const el = document.getElementById('totalDays');
  el.textContent = count;
  if (count !== lastDayCount && lastDayCount > 0) {
    el.classList.remove('bounce');
    void el.offsetWidth; // force reflow
    el.classList.add('bounce');
  }
  lastDayCount = count;
}

// ===== Calendar =====
function renderCalendar() {
  document.getElementById('monthTitle').textContent = `${currentYear}年${currentMonth+1}月`;
  updateDayCount(Object.keys(diaryData).length);

  // Legend icons
  document.getElementById('legendMoon').innerHTML = moonSVG('calm', 14);
  document.getElementById('legendStar').innerHTML = starSVG('calm', 14);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today);

  for (let i = 0; i < startDow; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const key = dateKey(date);
    const isToday = key === todayKey;
    const entry = diaryData[key];

    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isToday ? ' today' : '');

    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    if (entry) {
      const moodsWrap = document.createElement('div');
      moodsWrap.className = 'day-moods';

      const userIcon = document.createElement('div');
      userIcon.className = 'day-mood-icon';
      userIcon.innerHTML = moonSVG(entry.user.mood, 22);
      moodsWrap.appendChild(userIcon);

      const npcIcon = document.createElement('div');
      npcIcon.className = 'day-mood-icon';
      npcIcon.innerHTML = starSVG(entry.npc.mood, 22);
      moodsWrap.appendChild(npcIcon);

      cell.appendChild(moodsWrap);
      cell.onclick = () => showDayDetail(key, date);
    } else if (isToday) {
      const btn = document.createElement('button');
      btn.className = 'write-btn';
      btn.textContent = '✏';
      btn.onclick = (e) => { e.stopPropagation(); openMoodPicker(key, date); };
      cell.appendChild(btn);
    }
    grid.appendChild(cell);
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

// ===== Mood Picker =====
function openMoodPicker(key, date) {
  writingDateKey = key;
  document.getElementById('pickerDate').textContent = `${date.getMonth()+1}月${date.getDate()}日`;
  document.getElementById('pickerWeekday').textContent = `星期${WEEKDAYS[date.getDay()]}`;
  const grid = document.getElementById('moodGrid');
  grid.innerHTML = '';
  MOODS.forEach(m => {
    const opt = document.createElement('div');
    opt.className = 'mood-option';
    const c = MOOD_COLORS[m.id];
    opt.innerHTML = `
      <div class="mood-circle" style="background:${c}10; border-color:${c}30;">
        ${moonSVG(m.id, 42)}
      </div>
      <span class="mood-label" style="color:${c};">${m.label}</span>
    `;
    opt.onclick = () => selectMood(m.id);
    grid.appendChild(opt);
  });
  document.getElementById('moodPicker').classList.add('active','slide-up');
}
function closeMoodPicker() { document.getElementById('moodPicker').classList.remove('active','slide-up'); }
function selectMood(id) { selectedMoodId = id; closeMoodPicker(); openEntryInput(); }

// ===== Entry Input =====
function openEntryInput() {
  const m = getMood(selectedMoodId);
  const c = MOOD_COLORS[selectedMoodId];
  document.getElementById('inputDate').textContent = writingDateKey;
  document.getElementById('inputMood').innerHTML = `
    <div class="mood-big">${moonSVG(selectedMoodId, 56)}</div>
    <span class="mood-tag" style="background:${c}18; color:${c};">${m.label}</span>
  `;
  document.getElementById('inputText').value = '';
  document.getElementById('entryInput').classList.add('active','slide-up');
  setTimeout(() => document.getElementById('inputText').focus(), 350);
}
function closeEntryInput() { document.getElementById('entryInput').classList.remove('active','slide-up'); }

function saveEntry() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;
  if (!diaryData[writingDateKey]) diaryData[writingDateKey] = {};
  diaryData[writingDateKey].user = { mood: selectedMoodId, text };
  const npcMood = randomMood();
  const replies = ['看到你写的，我也想说点什么','今天也辛苦了','不管怎样，我都在','你的心情我感受到了','想给你一个拥抱'];
  diaryData[writingDateKey].npc = { mood: npcMood.id, text: replies[Math.floor(Math.random()*replies.length)], locked: false };
  closeEntryInput(); renderCalendar();
}

// ===== Day Detail =====
function showDayDetail(key, date) {

function unlockEntry(key) {

}

// ===== Summary =====
function showSummary() {
  document.getElementById('summaryTitle').textContent = `${currentYear}年${currentMonth+1}月`;
  const content = document.getElementById('summaryContent');
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const userMoods=[], npcMoods=[], userCount={}, npcCount={}, userDay=[], npcDay=[];

  for (let d=1; d<=daysInMonth; d++) {
    const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = diaryData[key];
    if (entry) {
      if (entry.user) { userMoods.push(entry.user.mood); userCount[entry.user.mood]=(userCount[entry.user.mood]||0)+1; userDay.push({day:d,mood:entry.user.mood}); }
      if (entry.npc) { npcMoods.push(entry.npc.mood); npcCount[entry.npc.mood]=(npcCount[entry.npc.mood]||0)+1; npcDay.push({day:d,mood:entry.npc.mood}); }
    }
  }

  const userTop = Object.entries(userCount).sort((a,b)=>b[1]-a[1])[0];
  const npcTop = Object.entries(npcCount).sort((a,b)=>b[1]-a[1])[0];

  // Jar - natural gravity stacking (heap shape, center-heavy like reference)
  const allMoods = [...userMoods.map(m=>({m,type:'moon'})), ...npcMoods.map(m=>({m,type:'star'}))];
  for (let i = allMoods.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allMoods[i], allMoods[j]] = [allMoods[j], allMoods[i]];
  }
  const jarW = 200, jarH = 270, bs = 18;
  const balls = []; // {cx, cy}
  
  // Simple 2D circle packing with gravity (with safety limit)
  function dropBall() {
    const r1 = Math.random(), r2 = Math.random();
    const gaussian = (r1 + r2) / 2;
    const cx = bs + gaussian * (jarW - bs * 2);
    let cy = jarH - bs/2 - 8;
    const minDist = bs * 0.85;
    
    // Max 50 iterations to prevent freeze
    for (let iter = 0; iter < 50; iter++) {
      let hit = false;
      for (const b of balls) {
        const dx = cx - b.cx, dy = cy - b.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) {
          cy = b.cy - minDist * 0.9;
          hit = true;
          break;
        }
      }
      if (!hit) break;
    }
    return { cx, cy };
  }
  
  let jarHtml = '';
  // Limit jar to 60 balls max for performance
  const jarMoods = allMoods.slice(0, 60);
  jarMoods.forEach((item, i) => {
    let best = null;
    for (let t = 0; t < 6; t++) {
      const pos = dropBall();
      if (!best || pos.cy > best.cy) best = pos;
    }
    // Organic jitter
    best.cx += (Math.random() - 0.5) * 4;
    best.cy += (Math.random() - 0.5) * 2;
    balls.push({ cx: best.cx, cy: best.cy });
    
    const rot = (Math.random() - 0.5) * 36;
    const scale = 0.85 + Math.random() * 0.25;
    const svg = item.type === 'moon' ? moonSVG(item.m, bs) : starSVG(item.m, bs);
    const left = best.cx - bs/2;
    const bottom = jarH - best.cy - bs/2;
    // Drop distance: from jar mouth (top) to final position
    const dropY = -(jarH - bottom + 20);
    jarHtml += `<div class="jar-ball" style="left:${left}px;bottom:${bottom}px;--rot:${rot}deg;--drop-y:${dropY}px;animation-delay:${(i*0.06)}s;animation-duration:0.5s;">${svg}</div>`;
  });

  let html = `<div class="mood-jar-wrap"><div class="mood-jar">
    <div class="jar-lid"></div><div class="jar-outline"></div><div class="jar-shine"></div>
    <div class="jar-balls">${jarHtml}</div></div></div>`;

  // Stats
  html += `<div class="summary-section-title">本月最多心情</div><div class="summary-stats">`;
  if (userTop) {
    const m = getMood(userTop[0]); const c = MOOD_COLORS[userTop[0]];
    html += `<div class="summary-stat-card"><span class="stat-who" style="color:var(--user-accent);">${USER_NAME}</span>
      <div class="stat-mood">${moonSVG(userTop[0],36)}</div>
      <span class="stat-label" style="color:${c};">${m.label}</span>
      <span class="stat-count">× ${userTop[1]}</span></div>`;
  }
  if (npcTop) {
    const m = getMood(npcTop[0]); const c = MOOD_COLORS[npcTop[0]];
    html += `<div class="summary-stat-card"><span class="stat-who" style="color:var(--npc-accent);">${NPC_NAME}</span>
      <div class="stat-mood">${starSVG(npcTop[0],36)}</div>
      <span class="stat-label" style="color:${c};">${m.label}</span>
      <span class="stat-count">× ${npcTop[1]}</span></div>`;
  }
  html += `</div>`;

  // Trend — Y-axis mood icons from top(happy) to bottom(sad)
  const yAxisMoods = ['excited','heartbeat','happy','calm','tired','irritated','angry','sad'];
  let yAxisHtml = '';
  yAxisMoods.forEach(mid => {
    yAxisHtml += `<div class="y-icon">${moonSVG(mid, 16)}</div>`;
  });
  html += `<div class="summary-section-title">心情趋势</div>
    <div class="trend-chart">
      <div class="trend-legend">
        <span><span class="leg-icon">${moonSVG('calm',12)}</span>${USER_NAME}</span>
        <span><span class="leg-icon">${starSVG('calm',12)}</span>${NPC_NAME}</span>
      </div>
      <div class="trend-chart-wrap">
        <div class="trend-y-axis">${yAxisHtml}</div>
        <div class="trend-canvas-wrap"><canvas class="trend-canvas" id="trendCanvas"></canvas></div>
      </div>
    </div>`;

  // Distribution
  html += `<div class="summary-section-title">心情分布</div><div class="mood-dist">`;
  MOODS.forEach(m => {
    const cnt = (userCount[m.id]||0) + (npcCount[m.id]||0);
    if (cnt > 0) {
      const c = MOOD_COLORS[m.id];
      html += `<div class="mood-dist-tag"><span class="tag-icon">${moonSVG(m.id,18)}</span>
        <span class="tag-label" style="color:${c};">${m.label}</span>
        <span class="tag-count">×${cnt}</span></div>`;
    }
  });
  html += `</div>`;

  content.innerHTML = html;
  document.getElementById('summaryPage').classList.add('active','slide-up');
  setTimeout(() => drawTrend(userDay, npcDay, daysInMonth), 80);
}
function closeSummary() { document.getElementById('summaryPage').classList.remove('active','slide-up'); }

// 0=sad(bottom) to 7=excited(top), matching Y-axis icon order
function moodVal(id) { return {excited:7,heartbeat:6,happy:5,calm:4,tired:3,irritated:2,angry:1,sad:0}[id]??3; }

function drawTrend(uDay, nDay, days) {
  const canvas = document.getElementById('trendCanvas'); if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*dpr; canvas.height = rect.height*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const W=rect.width, H=rect.height, pL=4, pR=8, pT=8, pB=28;
  const cW=W-pL-pR, cH=H-pT-pB;

  // Horizontal grid lines for each mood level (8 levels, 0-7)
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let i=0;i<=7;i++){
    const y=pT+(cH/7)*i;
    ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();
  }

  // X-axis date labels: 1, 5, 10, 15, 20, 25, 30
  const xDates = [1, 5, 10, 15, 20, 25, 30].filter(d => d <= days);
  ctx.fillStyle = 'rgba(232,236,244,0.3)';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  xDates.forEach(d => {
    const x = pL + ((d - 1) / (days - 1)) * cW;
    ctx.fillText(d, x, H - 6);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, pT + cH); ctx.lineTo(x, pT + cH + 4); ctx.stroke();
  });

  function drawLine(dms, color) {
    if(dms.length<2) return;
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round';
    dms.forEach((dm,i) => {
      const x = pL+((dm.day-1)/(days-1))*cW;
      const y = pT+cH-(moodVal(dm.mood)/7)*cH;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Glow
    ctx.strokeStyle = color + '30'; ctx.lineWidth = 4;
    ctx.beginPath();
    dms.forEach((dm,i) => {
      const x = pL+((dm.day-1)/(days-1))*cW;
      const y = pT+cH-(moodVal(dm.mood)/7)*cH;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  drawLine(uDay, '#C4B5FD');
  drawLine(nDay, '#67B2FF');
}

// ===== Init =====
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
renderCalendar();
</script>

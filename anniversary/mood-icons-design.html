<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心情图标设计稿 v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0B0E1A;
  font-family: -apple-system, 'PingFang SC', sans-serif;
  color: #E8ECF4;
  padding: 40px 20px;
  display: flex; flex-direction: column; align-items: center;
}
h1 {
  font-size: 24px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, #C4B5FD, #67B2FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 13px; color: rgba(232,236,244,0.4); margin-bottom: 40px; }
.section-title {
  font-size: 16px; font-weight: 600; margin: 32px 0 20px;
  display: flex; align-items: center; gap: 8px;
}
.badge {
  font-size: 11px; padding: 3px 10px; border-radius: 8px; font-weight: 500;
}
.grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 20px; max-width: 440px; width: 100%;
}
.icon-cell {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.icon-label { font-size: 13px; color: rgba(232,236,244,0.6); font-weight: 500; }
.divider { width: 100%; max-width: 440px; height: 1px; background: rgba(255,255,255,0.05); margin: 32px 0; }

.sizes-row { display: flex; gap: 28px; align-items: flex-end; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
.size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.size-label { font-size: 10px; color: rgba(232,236,244,0.3); }

.cal-preview {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  max-width: 380px; width: 100%; background: rgba(255,255,255,0.02);
  border-radius: 12px; padding: 12px; margin-top: 12px;
}
.cal-cell {
  display: flex; flex-direction: column; align-items: center; padding: 4px 0; gap: 2px;
}
.cal-cell .day-n { font-size: 10px; color: rgba(232,236,244,0.25); margin-bottom: 2px; }
</style>
</head>
<body>

<h1>心情图标设计系统 v2</h1>
<p class="subtitle">🌙 月亮 = 用户　　⭐ 星星 = 智能体 · 卡通手绘风</p>

<div class="section-title">
  <span>🌙 月亮表情</span>
  <span class="badge" style="background:rgba(196,181,253,0.12);color:#C4B5FD;">用户</span>
</div>
<div class="grid" id="moonGrid"></div>

<div class="divider"></div>

<div class="section-title">
  <span>⭐ 星星表情</span>
  <span class="badge" style="background:rgba(103,178,255,0.12);color:#67B2FF;">智能体</span>
</div>
<div class="grid" id="starGrid"></div>

<div class="divider"></div>

<div class="section-title">📐 尺寸预览</div>
<div class="sizes-row" id="sizePreview"></div>

<div class="divider"></div>

<div class="section-title">📅 日历效果预览</div>
<div class="cal-preview" id="calPreview"></div>

<script>
// ===== Mood Config =====
// Colors matched to reference images
const MOODS = [
  { id: 'happy',     label: '开心', fill: '#F4A261', shade: '#E08B4A' },
  { id: 'heartbeat', label: '心动', fill: '#F4B4C8', shade: '#E09AB0' },
  { id: 'excited',   label: '兴奋', fill: '#F4D35E', shade: '#E0BF4A' },
  { id: 'calm',      label: '平静', fill: '#8BC98B', shade: '#6FB06F' },
  { id: 'tired',     label: '心累', fill: '#C4B5A0', shade: '#A89A86' },
  { id: 'angry',     label: '生气', fill: '#E87461', shade: '#D05A48' },
  { id: 'irritated', label: '烦躁', fill: '#9B9BC8', shade: '#8080B0' },
  { id: 'sad',       label: '伤心', fill: '#9CC8E8', shade: '#7AB0D0' },
];

// ===== MOON SVG =====
// Thick crescent C-shape, kawaii style, bold features
function moonSVG(mood, size) {
  const s = size || 80;
  const face = moonFace(mood.id, mood);
  const deco = moonDeco(mood.id, mood);
  return `<svg viewBox="0 0 100 100" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">
    ${deco}
    <!-- Moon body: thick crescent -->
    <path d="M58 8 C80 8 95 28 95 52 C95 76 80 95 58 95
             C40 95 25 82 20 65
             C35 75 50 68 50 52
             C50 36 35 28 20 38
             C25 20 40 8 58 8Z"
      fill="${mood.fill}" stroke="${mood.shade}" stroke-width="1.5"/>
    <!-- Shading -->
    <path d="M58 8 C80 8 95 28 95 52 C95 76 80 95 58 95
             C40 95 25 82 20 65
             C35 75 50 68 50 52
             C50 36 35 28 20 38
             C25 20 40 8 58 8Z"
      fill="url(#moonShade_${mood.id})" opacity="0.3"/>
    <defs>
      <linearGradient id="moonShade_${mood.id}" x1="0.3" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
        <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
      </linearGradient>
    </defs>
    ${face}
  </svg>`;
}

function moonFace(id, mood) {
  // All faces use bold dark strokes, kawaii style
  const dk = '#3A3A3A';
  const faces = {
    happy: `
      <!-- Eyes: round dots -->
      <circle cx="58" cy="45" r="4" fill="${dk}"/>
      <circle cx="78" cy="42" r="4" fill="${dk}"/>
      <!-- Eye highlights -->
      <circle cx="60" cy="43" r="1.5" fill="#fff"/>
      <circle cx="80" cy="40" r="1.5" fill="#fff"/>
      <!-- Open smile -->
      <path d="M55 58 Q67 70 80 56" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <!-- Blush -->
      <ellipse cx="52" cy="56" rx="5" ry="3" fill="#E08B4A" opacity="0.5"/>
      <ellipse cx="82" cy="52" rx="4" ry="2.5" fill="#E08B4A" opacity="0.5"/>
    `,
    heartbeat: `
      <!-- Squished happy eyes -->
      <path d="M54 44 Q59 39 64 44" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M72 41 Q77 36 82 41" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <!-- Cute smile -->
      <path d="M58 58 Q67 66 78 57" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Blush lines -->
      <line x1="50" y1="52" x2="54" y2="52" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="50" y1="55" x2="54" y2="55" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="80" y1="49" x2="84" y2="49" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="80" y1="52" x2="84" y2="52" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    `,
    excited: `
      <!-- Squished excited eyes like > < -->
      <path d="M55 42 L60 46 L55 50" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M82 40 L77 44 L82 48" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Big open mouth -->
      <ellipse cx="68" cy="62" rx="8" ry="6" fill="${dk}" opacity="0.85"/>
      <ellipse cx="68" cy="59" rx="6" ry="3" fill="#E0BF4A" opacity="0.5"/>
    `,
    calm: `
      <!-- Peaceful closed eyes (dashes) -->
      <line x1="54" y1="45" x2="64" y2="45" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="72" y1="43" x2="82" y2="43" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <!-- Gentle smile -->
      <path d="M60 58 Q67 63 76 58" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
    tired: `
      <!-- Droopy half-closed eyes -->
      <path d="M54 42 L64 42" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <ellipse cx="59" cy="44" rx="4" ry="2.5" fill="${dk}" opacity="0.4"/>
      <path d="M72 40 L82 40" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <ellipse cx="77" cy="42" rx="4" ry="2.5" fill="${dk}" opacity="0.4"/>
      <!-- Tongue sticking out -->
      <path d="M62 58 Q67 62 72 58" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="67" cy="63" rx="4" ry="3.5" fill="#E8A0A0" opacity="0.7"/>
      <path d="M63 62 Q67 58 71 62" stroke="${dk}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    `,
    angry: `
      <!-- Angry scrunched eyes -->
      <path d="M54 46 L60 42 L54 42" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M82 44 L76 40 L82 40" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Wavy angry mouth -->
      <path d="M56 60 Q62 56 68 60 Q74 64 80 58" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    `,
    irritated: `
      <!-- Furrowed brow eyes -->
      <path d="M56 40 L62 44" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M80 38 L74 42" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="47" x2="63" y2="47" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="73" y1="45" x2="81" y2="45" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <!-- Frown + tongue -->
      <path d="M60 60 Q67 55 76 60" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="68" cy="65" rx="3.5" ry="3" fill="#E8A0A0" opacity="0.6"/>
    `,
    sad: `
      <!-- Big watery eyes -->
      <ellipse cx="58" cy="44" rx="5" ry="6" fill="${dk}"/>
      <ellipse cx="78" cy="42" rx="5" ry="6" fill="${dk}"/>
      <!-- Big white highlights (watery look) -->
      <circle cx="60" cy="42" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="80" cy="40" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="56" cy="46" r="1.2" fill="#fff" opacity="0.4"/>
      <circle cx="76" cy="44" r="1.2" fill="#fff" opacity="0.4"/>
      <!-- Sad wavy mouth -->
      <path d="M58 62 Q65 58 74 62" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
  };
  return faces[id] || faces.calm;
}

function moonDeco(id, mood) {
  const decos = {
    happy: `
      <!-- Sparkle cross -->
      <line x1="40" y1="22" x2="40" y2="30" stroke="#E08B4A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="36" y1="26" x2="44" y2="26" stroke="#E08B4A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <circle cx="35" cy="18" r="1.5" fill="#E08B4A" opacity="0.5"/>
    `,
    heartbeat: `
      <!-- Floating heart -->
      <path d="M42 15 C42 11 46 10 48 13 C50 10 54 11 54 15 C54 20 48 24 48 24 C48 24 42 20 42 15Z"
        fill="#FF6B8A" opacity="0.85"/>
    `,
    excited: `
      <!-- Radiating lines -->
      <line x1="45" y1="10" x2="48" y2="18" stroke="#E0BF4A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="35" y1="15" x2="40" y2="22" stroke="#E0BF4A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="88" y1="20" x2="94" y2="15" stroke="#E0BF4A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="92" y1="30" x2="98" y2="28" stroke="#E0BF4A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    `,
    calm: ``,
    tired: `
      <!-- Small cloud/sigh puff -->
      <circle cx="48" cy="25" r="4" fill="#C4B5A0" opacity="0.3"/>
      <circle cx="43" cy="22" r="3" fill="#C4B5A0" opacity="0.25"/>
      <circle cx="53" cy="23" r="3" fill="#C4B5A0" opacity="0.2"/>
    `,
    angry: `
      <!-- Steam puffs -->
      <path d="M58 8 Q55 4 58 2" stroke="#C0C0C0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M65 6 Q62 2 65 0" stroke="#C0C0C0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M72 9 Q69 5 72 3" stroke="#C0C0C0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    `,
    irritated: `
      <!-- Scribble tangle -->
      <path d="M38 22 Q42 18 40 22 Q38 26 42 24 Q46 22 44 26 Q42 30 46 28"
        stroke="#8080B0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    `,
    sad: `
      <!-- Rain lines -->
      <line x1="55" y1="72" x2="52" y2="82" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="65" y1="74" x2="62" y2="84" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="75" y1="72" x2="72" y2="82" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    `,
  };
  return decos[id] || '';
}

// ===== STAR SVG =====
// Rounded 5-pointed star, soft/chubby
function starSVG(mood, size) {
  const s = size || 80;
  const face = starFace(mood.id, mood);
  const deco = starDeco(mood.id, mood);
  // Very rounded star path
  return `<svg viewBox="0 0 100 100" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">
    ${deco}
    <!-- Rounded star body -->
    <path d="M50 8
             Q54 8 58 22 L62 22 Q68 20 72 26
             Q76 22 82 24 L86 28 Q90 34 86 38
             L92 42 Q96 48 92 52
             L88 56 Q90 62 86 66
             Q88 70 82 70 L78 74 Q74 80 68 78
             L62 78 Q58 82 54 82
             Q50 84 46 82 L42 80 Q36 82 32 78
             L28 74 Q22 72 20 66
             Q16 62 16 56 L12 52 Q8 48 12 42
             L16 38 Q14 32 18 28
             Q22 22 28 24 L32 22 Q36 18 42 22
             L46 22 Q48 8 50 8Z"
      fill="${mood.fill}" stroke="${mood.shade}" stroke-width="1.5"/>
    <!-- Shading -->
    <path d="M50 8
             Q54 8 58 22 L62 22 Q68 20 72 26
             Q76 22 82 24 L86 28 Q90 34 86 38
             L92 42 Q96 48 92 52
             L88 56 Q90 62 86 66
             Q88 70 82 70 L78 74 Q74 80 68 78
             L62 78 Q58 82 54 82
             Q50 84 46 82 L42 80 Q36 82 32 78
             L28 74 Q22 72 20 66
             Q16 62 16 56 L12 52 Q8 48 12 42
             L16 38 Q14 32 18 28
             Q22 22 28 24 L32 22 Q36 18 42 22
             L46 22 Q48 8 50 8Z"
      fill="url(#starShade_${mood.id})" opacity="0.25"/>
    <defs>
      <linearGradient id="starShade_${mood.id}" x1="0.3" y1="0" x2="0.7" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.35"/>
        <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
      </linearGradient>
    </defs>
    ${face}
  </svg>`;
}

function starFace(id, mood) {
  const dk = '#3A3A3A';
  const faces = {
    happy: `
      <circle cx="40" cy="45" r="4.5" fill="${dk}"/>
      <circle cx="62" cy="45" r="4.5" fill="${dk}"/>
      <circle cx="42" cy="43" r="1.8" fill="#fff"/>
      <circle cx="64" cy="43" r="1.8" fill="#fff"/>
      <path d="M38 56 Q50 66 64 56" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="34" cy="54" rx="4" ry="2.5" fill="${mood.shade}" opacity="0.4"/>
      <ellipse cx="68" cy="54" rx="4" ry="2.5" fill="${mood.shade}" opacity="0.4"/>
    `,
    heartbeat: `
      <path d="M36 44 Q40 39 44 44" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M56 44 Q60 39 64 44" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M40 56 Q50 64 62 56" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <line x1="32" y1="50" x2="36" y2="50" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="32" y1="53" x2="36" y2="53" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="64" y1="50" x2="68" y2="50" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="64" y1="53" x2="68" y2="53" stroke="#D06080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    `,
    excited: `
      <path d="M36 42 L41 47 L36 52" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M64 42 L59 47 L64 52" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="50" cy="62" rx="8" ry="6" fill="${dk}" opacity="0.85"/>
      <ellipse cx="50" cy="59" rx="6" ry="3" fill="${mood.fill}" opacity="0.4"/>
    `,
    calm: `
      <line x1="35" y1="46" x2="45" y2="46" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="55" y1="46" x2="65" y2="46" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M42 58 Q50 63 58 58" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
    tired: `
      <path d="M35 44 L45 44" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <ellipse cx="40" cy="46" rx="4" ry="2.2" fill="${dk}" opacity="0.4"/>
      <path d="M55 44 L65 44" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <ellipse cx="60" cy="46" rx="4" ry="2.2" fill="${dk}" opacity="0.4"/>
      <path d="M44 58 Q50 62 56 58" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="64" rx="3.5" ry="3" fill="#E8A0A0" opacity="0.7"/>
    `,
    angry: `
      <path d="M35 44 L42 40 L35 40" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M65 44 L58 40 L65 40" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M38 58 Q44 54 50 58 Q56 62 62 56" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    `,
    irritated: `
      <path d="M37 40 L43 44" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M63 40 L57 44" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="35" y1="47" x2="45" y2="47" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="55" y1="47" x2="65" y2="47" stroke="${dk}" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M42 60 Q50 55 58 60" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="65" rx="3" ry="2.5" fill="#E8A0A0" opacity="0.5"/>
    `,
    sad: `
      <ellipse cx="40" cy="45" rx="5.5" ry="7" fill="${dk}"/>
      <ellipse cx="60" cy="45" rx="5.5" ry="7" fill="${dk}"/>
      <circle cx="42" cy="43" r="2.8" fill="#fff" opacity="0.8"/>
      <circle cx="62" cy="43" r="2.8" fill="#fff" opacity="0.8"/>
      <circle cx="38" cy="47" r="1.2" fill="#fff" opacity="0.35"/>
      <circle cx="58" cy="47" r="1.2" fill="#fff" opacity="0.35"/>
      <path d="M42 62 Q50 58 58 62" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
  };
  return faces[id] || faces.calm;
}

function starDeco(id, mood) {
  const decos = {
    happy: `
      <line x1="78" y1="28" x2="78" y2="36" stroke="${mood.shade}" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="74" y1="32" x2="82" y2="32" stroke="${mood.shade}" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <circle cx="72" cy="24" r="1.5" fill="${mood.shade}" opacity="0.4"/>
    `,
    heartbeat: `
      <path d="M72 14 C72 10 76 9 78 12 C80 9 84 10 84 14 C84 19 78 23 78 23 C78 23 72 19 72 14Z"
        fill="#FF6B8A" opacity="0.8"/>
    `,
    excited: `
      <line x1="78" y1="10" x2="82" y2="4" stroke="#E0BF4A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="84" y1="14" x2="90" y2="10" stroke="#E0BF4A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="88" y1="22" x2="94" y2="20" stroke="#E0BF4A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    `,
    calm: ``,
    tired: `
      <circle cx="76" cy="22" r="4" fill="${mood.fill}" opacity="0.25"/>
      <circle cx="72" cy="18" r="3" fill="${mood.fill}" opacity="0.2"/>
      <circle cx="81" cy="20" r="2.5" fill="${mood.fill}" opacity="0.15"/>
    `,
    angry: `
      <path d="M42 6 Q39 2 42 0" stroke="#C0C0C0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M50 4 Q47 0 50 -2" stroke="#C0C0C0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M58 6 Q55 2 58 0" stroke="#C0C0C0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    `,
    irritated: `
      <path d="M22 28 Q26 24 24 28 Q22 32 26 30 Q30 28 28 32"
        stroke="#8080B0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    `,
    sad: `
      <line x1="36" y1="74" x2="33" y2="84" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="50" y1="76" x2="47" y2="86" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="64" y1="74" x2="61" y2="84" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    `,
  };
  return decos[id] || '';
}

// ===== Render =====
const moonGrid = document.getElementById('moonGrid');
MOODS.forEach(m => {
  const cell = document.createElement('div');
  cell.className = 'icon-cell';
  cell.innerHTML = `${moonSVG(m, 80)}<span class="icon-label">${m.label}</span>`;
  moonGrid.appendChild(cell);
});

const starGrid = document.getElementById('starGrid');
MOODS.forEach(m => {
  const cell = document.createElement('div');
  cell.className = 'icon-cell';
  cell.innerHTML = `${starSVG(m, 80)}<span class="icon-label">${m.label}</span>`;
  starGrid.appendChild(cell);
});

// Size preview
const sizeRow = document.getElementById('sizePreview');
[{s:22,l:'日历 22px'},{s:36,l:'详情 36px'},{s:52,l:'选择 52px'},{s:80,l:'大图 80px'}].forEach(sz => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `<div style="display:flex;gap:6px;">${moonSVG(MOODS[0],sz.s)}${starSVG(MOODS[1],sz.s)}</div><span class="size-label">${sz.l}</span>`;
  sizeRow.appendChild(item);
});

// Calendar preview
const calEl = document.getElementById('calPreview');
const mockDays = [
  {d:12,u:0,n:1},{d:13,u:3,n:0},{d:14,u:2,n:2},{d:15,u:7,n:3},
  {d:16,u:1,n:1},{d:17,u:null,n:null},{d:18,u:null,n:null},
];
mockDays.forEach(day => {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  cell.innerHTML = `<span class="day-n">${day.d}</span>
    ${day.u !== null ? moonSVG(MOODS[day.u], 22) : '<div style="width:22px;height:22px;"></div>'}
    ${day.n !== null ? starSVG(MOODS[day.n], 22) : '<div style="width:22px;height:22px;"></div>'}`;
  calEl.appendChild(cell);
});
</script>

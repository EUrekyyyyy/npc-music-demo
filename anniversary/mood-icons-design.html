<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心情图标设计稿 v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0B0E1A;
  font-family: -apple-system, 'PingFang SC', sans-serif;
  color: #E8ECF4;
  padding: 40px 20px;
  display: flex; flex-direction: column; align-items: center;
}
h1 {
  font-size: 24px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, #C4B5FD, #67B2FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 13px; color: rgba(232,236,244,0.4); margin-bottom: 40px; }
.section-title {
  font-size: 16px; font-weight: 600; margin: 32px 0 20px;
  display: flex; align-items: center; gap: 8px;
}
.badge {
  font-size: 11px; padding: 3px 10px; border-radius: 8px; font-weight: 500;
}
.grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 20px; max-width: 440px; width: 100%;
}
.icon-cell {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.icon-label { font-size: 13px; color: rgba(232,236,244,0.6); font-weight: 500; }
.divider { width: 100%; max-width: 440px; height: 1px; background: rgba(255,255,255,0.05); margin: 32px 0; }

.sizes-row { display: flex; gap: 28px; align-items: flex-end; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
.size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.size-label { font-size: 10px; color: rgba(232,236,244,0.3); }

.cal-preview {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  max-width: 380px; width: 100%; background: rgba(255,255,255,0.02);
  border-radius: 12px; padding: 12px; margin-top: 12px;
}
.cal-cell {
  display: flex; flex-direction: column; align-items: center; padding: 4px 0; gap: 2px;
}
.cal-cell .day-n { font-size: 10px; color: rgba(232,236,244,0.25); margin-bottom: 2px; }
</style>
</head>
<body>

<h1>心情图标设计系统 v2</h1>
<p class="subtitle">🌙 月亮 = 用户　　⭐ 星星 = 智能体 · 卡通手绘风</p>

<div class="section-title">
  <span>🌙 月亮表情</span>
  <span class="badge" style="background:rgba(196,181,253,0.12);color:#C4B5FD;">用户</span>
</div>
<div class="grid" id="moonGrid"></div>

<div class="divider"></div>

<div class="section-title">
  <span>⭐ 星星表情</span>
  <span class="badge" style="background:rgba(103,178,255,0.12);color:#67B2FF;">智能体</span>
</div>
<div class="grid" id="starGrid"></div>

<div class="divider"></div>

<div class="section-title">📐 尺寸预览</div>
<div class="sizes-row" id="sizePreview"></div>

<div class="divider"></div>

<div class="section-title">📅 日历效果预览</div>
<div class="cal-preview" id="calPreview"></div>

<script>
// ===== Mood Config =====
// Colors matched to reference images
const MOODS = [
  { id: 'happy',     label: '开心', fill: '#F4A261', shade: '#E08B4A' },
  { id: 'heartbeat', label: '心动', fill: '#F4B4C8', shade: '#E09AB0' },
  { id: 'excited',   label: '兴奋', fill: '#F4D35E', shade: '#E0BF4A' },
  { id: 'calm',      label: '平静', fill: '#8BC98B', shade: '#6FB06F' },
  { id: 'tired',     label: '心累', fill: '#C4B5A0', shade: '#A89A86' },
  { id: 'angry',     label: '生气', fill: '#E87461', shade: '#D05A48' },

  { id: 'sad',       label: '伤心', fill: '#9CC8E8', shade: '#7AB0D0' },

// ===== MOON SVG =====
// Thick crescent C-shape, kawaii style, bold features
function moonSVG(mood, size) {
  const s = size || 80;
  const face = moonFace(mood.id, mood);
  const deco = moonDeco(mood.id, mood);
  return `<svg viewBox="0 0 100 100" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">
    ${deco}
    <!-- Moon body: pure C-shape crescent, no circle -->
    <path d="M55 6
             C78 6 96 24 96 50
             C96 76 78 94 55 94
             C42 94 30 86 24 74
             C32 80 42 82 52 78
             C68 70 76 56 76 50
             C76 44 68 30 52 22
             C42 18 32 20 24 26
             C30 14 42 6 55 6Z"
      fill="${mood.fill}" stroke="${mood.shade}" stroke-width="1.5"/>
    <!-- Shading -->
    <path d="M55 6
             C78 6 96 24 96 50
             C96 76 78 94 55 94
             C42 94 30 86 24 74
             C32 80 42 82 52 78
             C68 70 76 56 76 50
             C76 44 68 30 52 22
             C42 18 32 20 24 26
             C30 14 42 6 55 6Z"
      fill="url(#moonShade_${mood.id})" opacity="0.3"/>
    <defs>
      <linearGradient id="moonShade_${mood.id}" x1="0.3" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
        <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
      </linearGradient>
    </defs>
    ${face}
  </svg>`;
}

// ===== STAR SVG =====
// Rounded 5-pointed star, soft/chubby
function starSVG(mood, size) {
  const s = size || 80;
  const face = starFace(mood.id, mood);

  return `<svg viewBox="0 0 100 100" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">

      fill="${mood.fill}" stroke="${mood.shade}" stroke-width="1.5"/>
    <!-- Shading -->
    <path d="M50 8
             Q54 8 58 22 L62 22 Q68 20 72 26
             Q76 22 82 24 L86 28 Q90 34 86 38

             Q88 70 82 70 L78 74 Q74 80 68 78

      <linearGradient id="starShade_${mood.id}" x1="0.3" y1="0" x2="0.7" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.35"/>

}

      <line x1="36" y1="74" x2="33" y2="84" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="50" y1="76" x2="47" y2="86" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="64" y1="74" x2="61" y2="84" stroke="#7AB0D0" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    `,
  };
  return decos[id] || '';
}

// ===== Render =====
const moonGrid = document.getElementById('moonGrid');
MOODS.forEach(m => {
  const cell = document.createElement('div');
  cell.className = 'icon-cell';
  cell.innerHTML = `${moonSVG(m, 80)}<span class="icon-label">${m.label}</span>`;
  moonGrid.appendChild(cell);
});

const starGrid = document.getElementById('starGrid');
MOODS.forEach(m => {
  const cell = document.createElement('div');
  cell.className = 'icon-cell';
  cell.innerHTML = `${starSVG(m, 80)}<span class="icon-label">${m.label}</span>`;
  starGrid.appendChild(cell);
});

// Size preview
const sizeRow = document.getElementById('sizePreview');
[{s:22,l:'日历 22px'},{s:36,l:'详情 36px'},{s:52,l:'选择 52px'},{s:80,l:'大图 80px'}].forEach(sz => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `<div style="display:flex;gap:6px;">${moonSVG(MOODS[0],sz.s)}${starSVG(MOODS[1],sz.s)}</div><span class="size-label">${sz.l}</span>`;
  sizeRow.appendChild(item);
});

// Calendar preview
const calEl = document.getElementById('calPreview');
const mockDays = [
  {d:12,u:0,n:1},{d:13,u:3,n:0},{d:14,u:2,n:2},{d:15,u:7,n:3},
  {d:16,u:1,n:1},{d:17,u:null,n:null},{d:18,u:null,n:null},
];
mockDays.forEach(day => {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  cell.innerHTML = `<span class="day-n">${day.d}</span>
    ${day.u !== null ? moonSVG(MOODS[day.u], 22) : '<div style="width:22px;height:22px;"></div>'}
    ${day.n !== null ? starSVG(MOODS[day.n], 22) : '<div style="width:22px;height:22px;"></div>'}`;
  calEl.appendChild(cell);
});
</script>
</body>

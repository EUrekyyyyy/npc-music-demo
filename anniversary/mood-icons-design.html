<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心情图标 v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A1A2E;font-family:-apple-system,'PingFang SC',sans-serif;color:#E8ECF4;padding:40px 16px;display:flex;flex-direction:column;align-items:center}
h1{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#C4B5FD,#67B2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:12px;color:rgba(232,236,244,0.35);margin-bottom:36px}
.st{font-size:15px;font-weight:600;margin:28px 0 16px;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;padding:3px 10px;border-radius:8px;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:400px;width:100%}
.ic{display:flex;flex-direction:column;align-items:center;gap:6px}
.il{font-size:12px;color:rgba(232,236,244,0.5);font-weight:500}
.div{width:100%;max-width:400px;height:1px;background:rgba(255,255,255,0.05);margin:28px 0}
.sr{display:flex;gap:24px;align-items:flex-end;margin-top:12px;flex-wrap:wrap;justify-content:center}
.si{display:flex;flex-direction:column;align-items:center;gap:6px}
.sl{font-size:10px;color:rgba(232,236,244,0.25)}
.cp{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:360px;width:100%;background:rgba(255,255,255,0.02);border-radius:12px;padding:10px;margin-top:10px}
.cc{display:flex;flex-direction:column;align-items:center;padding:3px 0;gap:2px}
.dn{font-size:9px;color:rgba(232,236,244,0.2)}
</style>
</head>
<body>
<h1>心情图标 v5</h1>
<p class="sub">🌙 月亮 = 用户　⭐ 星星 = 智能体 · 对照参考图精调版</p>

<div class="st"><span>🌙 月亮表情</span><span class="badge" style="background:rgba(196,181,253,0.12);color:#C4B5FD">用户</span></div>
<div class="grid" id="mG"></div>
<div class="div"></div>
<div class="st"><span>⭐ 星星表情</span><span class="badge" style="background:rgba(103,178,255,0.12);color:#67B2FF">智能体</span></div>
<div class="grid" id="sG"></div>
<div class="div"></div>
<div class="st">📐 尺寸预览</div>
<div class="sr" id="szP"></div>
<div class="div"></div>
<div class="st">📅 日历效果</div>
<div class="cp" id="cP"></div>

<script>
const M = [
  {id:'happy',    l:'开心', f:'#F4A261', s:'#D8894A'},
  {id:'heartbeat',l:'心动', f:'#F4B4C8', s:'#D89AAE'},
  {id:'excited',  l:'兴奋', f:'#F4D35E', s:'#D8B948'},
  {id:'calm',     l:'平静', f:'#8BC98B', s:'#6FAD6F'},
  {id:'tired',    l:'心累', f:'#C4B5A0', s:'#A89A86'},
  {id:'angry',    l:'生气', f:'#E8855C', s:'#CC6A42'},
  {id:'irritated',l:'烦躁', f:'#9B9BC8', s:'#7F7FAA'},
  {id:'sad',      l:'伤心', f:'#9CC8E8', s:'#7AACCC'},
];

// ========================
// MOON — face on CONCAVE side (left/inner arc)
// Crescent opens RIGHT, face on LEFT inner area
// ========================
function moon(m, sz) {
  return `<svg viewBox="0 0 100 100" width="${sz||80}" height="${sz||80}" xmlns="http://www.w3.org/2000/svg">
    ${mDeco(m)}
    <path d="M45 8
             C22 12 8 28 8 50
             C8 72 22 88 45 92
             C56 92 66 88 72 80
             C60 84 48 80 40 72
             C30 60 30 40 40 28
             C48 20 60 16 72 20
             C66 12 56 8 45 8Z"
      fill="${m.f}"/>
    <ellipse cx="22" cy="38" rx="8" ry="11" fill="#fff" opacity="0.08" transform="rotate(8 22 38)"/>
    ${mFace(m)}
  </svg>`;
}

function mFace(m) {
  const dk='#3A3A3A';
  // Diagonal blush lines // style
  function blush(x1,y1,x2,y2,c) {
    const cl = c||m.s;
    return `
      <line x1="${x1}" y1="${y1}" x2="${x1+3}" y2="${y1+5}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
      <line x1="${x1+4}" y1="${y1-1}" x2="${x1+7}" y2="${y1+4}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
      <line x1="${x2}" y1="${y2}" x2="${x2+3}" y2="${y2+5}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
      <line x1="${x2+4}" y1="${y2-1}" x2="${x2+7}" y2="${y2+4}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    `;
  }
  const F = {
    // 开心: dot eyes, big pink open mouth, // blush
    happy: `
      <circle cx="24" cy="42" r="3.5" fill="${dk}"/>
      <circle cx="42" cy="42" r="3.5" fill="${dk}"/>
      <circle cx="25" cy="41" r="1.2" fill="#fff"/>
      <circle cx="43" cy="41" r="1.2" fill="#fff"/>
      <path d="M22 55 Q33 66 46 55" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M22 55 Q33 66 46 55Z" fill="#E8A0A0" opacity="0.55"/>
      ${blush(14,48,46,48)}
    `,
    // 心动: one dot + one wink, smile, // blush pink
    heartbeat: `
      <circle cx="24" cy="42" r="3.5" fill="${dk}"/>
      <circle cx="25" cy="41" r="1.2" fill="#fff"/>
      <path d="M38 40 L42 44 L46 40" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M24 56 Q33 64 44 56" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      ${blush(14,49,44,49,'#D06880')}
    `,
    // 兴奋: >< eyes, big mouth + red tongue, // blush diagonal
    excited: `
      <path d="M20 40 L26 44 L20 48" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M48 40 L42 44 L48 48" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="33" cy="58" rx="7" ry="5.5" fill="${dk}"/>
      <ellipse cx="33" cy="61" rx="5" ry="3" fill="#E88080" opacity="0.7"/>
      ${blush(14,50,46,50)}
    `,
    // 平静: closed eye arcs ∪ shape, gentle smile
    calm: `
      <path d="M20 43 Q25 38 30 43" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M36 43 Q41 38 46 43" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M26 55 Q33 59 40 55" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
    `,
    // 心累: droopy ∩ eyes (sad arcs), puckered lips + tongue
    tired: `
      <path d="M20 42 Q25 46 30 42" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M36 42 Q41 46 46 42" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="33" cy="56" rx="3.5" ry="2.5" fill="${dk}" opacity="0.65"/>
      <ellipse cx="33" cy="59" rx="3.5" ry="3" fill="#E8A0A0" opacity="0.6"/>
    `,
    // 生气: SPIRAL eyes + flat frown + anger marks
    angry: `
      <path d="M22 40 Q22 36 26 36 Q30 36 30 40 Q30 44 26 44 Q24 44 24 42" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M38 40 Q38 36 42 36 Q46 36 46 40 Q46 44 42 44 Q40 44 40 42" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="26" y1="56" x2="42" y2="56" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M28 54 Q30 52 32 54" stroke="${dk}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    `,
    // 烦躁: furrowed brows + one dot one squint + squiggly mouth + tongue
    irritated: `
      <line x1="18" y1="36" x2="28" y2="40" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="48" y1="36" x2="38" y2="40" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="24" cy="44" r="2.8" fill="${dk}"/>
      <path d="M36 43 Q41 46 46 43" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M26 56 Q30 52 34 56" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="34" cy="60" rx="3" ry="2.5" fill="#E8A0A0" opacity="0.55"/>
    `,
    // 伤心: big watery eyes + sad mouth + tear trail
    sad: `
      <ellipse cx="24" cy="42" rx="4.5" ry="5.5" fill="${dk}"/>
      <ellipse cx="42" cy="42" rx="4.5" ry="5.5" fill="${dk}"/>
      <circle cx="26" cy="40" r="2.2" fill="#fff" opacity="0.8"/>
      <circle cx="44" cy="40" r="2.2" fill="#fff" opacity="0.8"/>
      <circle cx="22" cy="44" r="0.9" fill="#fff" opacity="0.3"/>
      <circle cx="40" cy="44" r="0.9" fill="#fff" opacity="0.3"/>
      <path d="M26 58 Q33 54 40 58" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M20 48 Q19 53 18 57" stroke="${m.s}" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.45"/>
      <ellipse cx="18" cy="59" rx="1.8" ry="2" fill="${m.s}" opacity="0.45"/>
    `,
  };
  return F[m.id]||F.calm;
}

function mDeco(m) {
  const D = {
    happy: `
      <line x1="58" y1="20" x2="58" y2="32" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="52" y1="26" x2="64" y2="26" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <circle cx="66" cy="18" r="1.5" fill="${m.s}" opacity="0.35"/>
    `,
    heartbeat: `
      <path d="M56 14 C56 8 61 7 63 12 C65 7 70 8 70 14 C70 21 63 26 63 26 C63 26 56 21 56 14Z" fill="#E85050" opacity="0.85"/>
    `,
    excited: `
      <line x1="8" y1="14" x2="8" y2="24" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="4" y1="19" x2="12" y2="19" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="14" y1="8" x2="14" y2="16" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    `,
    calm: ``,
    tired: `
      <circle cx="62" cy="20" r="5" fill="${m.f}" opacity="0.2"/>
      <circle cx="56" cy="16" r="3.5" fill="${m.f}" opacity="0.16"/>
      <circle cx="68" cy="18" r="3" fill="${m.f}" opacity="0.13"/>
    `,
    angry: `
      <path d="M58 22 Q62 18 60 22 Q58 26 62 24 Q66 22 64 26" stroke="${m.s}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M68 16 Q72 12 70 16 Q68 20 72 18" stroke="${m.s}" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    `,
    irritated: `
      <path d="M56 22 Q60 18 58 22 Q56 26 60 24 Q64 22 62 26 Q60 30 64 28" stroke="${m.s}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.45"/>
    `,
    sad: `
      <line x1="56" y1="16" x2="56" y2="28" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="62" y1="18" x2="62" y2="30" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="68" y1="16" x2="68" y2="28" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    `,
  };
  return D[m.id]||'';
}

// ========================
// STAR — Ultra round puffy blob
// ========================
function star(m, sz) {
  return `<svg viewBox="0 0 100 100" width="${sz||80}" height="${sz||80}" xmlns="http://www.w3.org/2000/svg">
    ${sDeco(m)}
    <path d="M50 6
             C54 6 55 18 58 22 C61 26 68 27 72 24
             C78 20 84 16 88 20 C92 24 88 32 86 36
             C84 40 84 44 86 48 C88 52 96 54 96 58
             C96 62 90 64 86 66 C82 68 80 72 78 76
             C76 80 78 88 76 92 C74 96 68 94 64 92
             C60 90 54 86 50 86 C46 86 40 90 36 92
             C32 94 26 96 24 92 C22 88 24 80 22 76
             C20 72 18 68 14 66 C10 64 4 62 4 58
             C4 54 12 52 14 48 C16 44 16 40 14 36
             C12 32 8 24 12 20 C16 16 22 20 28 24
             C32 27 39 26 42 22 C45 18 46 6 50 6Z"
      fill="${m.f}"/>
    <ellipse cx="36" cy="34" rx="8" ry="10" fill="#fff" opacity="0.06" transform="rotate(-8 36 34)"/>
    ${sFace(m)}
  </svg>`;
}

function sFace(m) {
  const dk='#3A3A3A';
  function blush(x1,y1,x2,y2,c) {
    const cl=c||m.s;
    return `
      <line x1="${x1}" y1="${y1}" x2="${x1+3}" y2="${y1+5}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
      <line x1="${x1+4}" y1="${y1-1}" x2="${x1+7}" y2="${y1+4}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
      <line x1="${x2}" y1="${y2}" x2="${x2+3}" y2="${y2+5}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
      <line x1="${x2+4}" y1="${y2-1}" x2="${x2+7}" y2="${y2+4}" stroke="${cl}" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    `;
  }
  const F = {
    happy: `
      <circle cx="38" cy="44" r="4" fill="${dk}"/>
      <circle cx="62" cy="44" r="4" fill="${dk}"/>
      <circle cx="39.5" cy="42.5" r="1.5" fill="#fff"/>
      <circle cx="63.5" cy="42.5" r="1.5" fill="#fff"/>
      <path d="M36 58 Q50 70 64 58" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M36 58 Q50 70 64 58Z" fill="#E8A0A0" opacity="0.55"/>
      ${blush(28,52,64,52)}
    `,
    heartbeat: `
      <circle cx="38" cy="44" r="4" fill="${dk}"/>
      <circle cx="39.5" cy="42.5" r="1.5" fill="#fff"/>
      <path d="M58 42 L62 46 L66 42" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M38 58 Q50 66 64 58" stroke="${dk}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      ${blush(28,52,64,52,'#D06880')}
    `,
    excited: `
      <path d="M34 42 L40 46 L34 50" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M66 42 L60 46 L66 50" stroke="${dk}" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="50" cy="60" rx="7" ry="5.5" fill="${dk}"/>
      <ellipse cx="50" cy="63" rx="5" ry="3" fill="#E88080" opacity="0.7"/>
      ${blush(26,52,64,52)}
    `,
    calm: `
      <path d="M34 46 Q39 41 44 46" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M56 46 Q61 41 66 46" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M42 58 Q50 63 58 58" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
    `,
    tired: `
      <path d="M34 44 Q39 48 44 44" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M56 44 Q61 48 66 44" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="58" rx="3.5" ry="2.5" fill="${dk}" opacity="0.65"/>
      <ellipse cx="50" cy="61" rx="3.5" ry="3" fill="#E8A0A0" opacity="0.6"/>
    `,
    angry: `
      <path d="M36 42 Q36 38 40 38 Q44 38 44 42 Q44 46 40 46 Q38 46 38 44" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M56 42 Q56 38 60 38 Q64 38 64 42 Q64 46 60 46 Q58 46 58 44" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <line x1="40" y1="58" x2="60" y2="58" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M44 56 Q46 54 48 56" stroke="${dk}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    `,
    irritated: `
      <line x1="32" y1="38" x2="42" y2="42" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="68" y1="38" x2="58" y2="42" stroke="${dk}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="38" cy="46" r="2.8" fill="${dk}"/>
      <path d="M56 45 Q61 48 66 45" stroke="${dk}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M42 58 Q46 54 50 58" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="62" rx="3" ry="2.5" fill="#E8A0A0" opacity="0.55"/>
    `,
    sad: `
      <ellipse cx="38" cy="44" rx="5" ry="6" fill="${dk}"/>
      <ellipse cx="62" cy="44" rx="5" ry="6" fill="${dk}"/>
      <circle cx="40" cy="42" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="64" cy="42" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="36" cy="46" r="1" fill="#fff" opacity="0.3"/>
      <circle cx="60" cy="46" r="1" fill="#fff" opacity="0.3"/>
      <path d="M42 62 Q50 58 58 62" stroke="${dk}" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M34 48 Q33 54 32 58" stroke="${m.s}" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.45"/>
      <ellipse cx="32" cy="60" rx="1.8" ry="2" fill="${m.s}" opacity="0.45"/>
    `,
  };
  return F[m.id]||F.calm;
}

function sDeco(m) {
  const D = {
    happy: `
      <line x1="76" y1="20" x2="76" y2="30" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="71" y1="25" x2="81" y2="25" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <circle cx="70" cy="17" r="1.5" fill="${m.s}" opacity="0.3"/>
    `,
    heartbeat: `
      <path d="M28 8 C28 2 33 1 35 6 C37 1 42 2 42 8 C42 15 35 20 35 20 C35 20 28 15 28 8Z" fill="#E85050" opacity="0.85"/>
    `,
    excited: `
      <line x1="24" y1="8" x2="24" y2="18" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="19" y1="13" x2="29" y2="13" stroke="${m.s}" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="16" y1="4" x2="16" y2="10" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    `,
    calm: ``,
    tired: `
      <circle cx="74" cy="16" r="5" fill="${m.f}" opacity="0.2"/>
      <circle cx="80" cy="12" r="3.5" fill="${m.f}" opacity="0.16"/>
      <circle cx="68" cy="13" r="3" fill="${m.f}" opacity="0.13"/>
    `,
    angry: `
      <path d="M72 22 Q76 18 74 22 Q72 26 76 24 Q80 22 78 26" stroke="${m.s}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M80 14 Q84 10 82 14 Q80 18 84 16" stroke="${m.s}" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    `,
    irritated: `
      <path d="M72 16 Q76 12 74 16 Q72 20 76 18 Q80 16 78 20 Q76 24 80 22" stroke="${m.s}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.45"/>
    `,
    sad: `
      <line x1="66" y1="14" x2="66" y2="26" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="72" y1="16" x2="72" y2="28" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="78" y1="14" x2="78" y2="26" stroke="${m.s}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    `,
  };
  return D[m.id]||'';
}

// Render
document.getElementById('mG').innerHTML=M.map(m=>`<div class="ic">${moon(m,80)}<span class="il">${m.l}</span></div>`).join('');
document.getElementById('sG').innerHTML=M.map(m=>`<div class="ic">${star(m,80)}<span class="il">${m.l}</span></div>`).join('');
document.getElementById('szP').innerHTML=[{z:22,l:'日历'},{z:36,l:'详情'},{z:52,l:'选择'},{z:80,l:'大图'}].map(s=>`<div class="si"><div style="display:flex;gap:6px">${moon(M[0],s.z)}${star(M[1],s.z)}</div><span class="sl">${s.l} ${s.z}px</span></div>`).join('');
document.getElementById('cP').innerHTML=[{d:12,u:0,n:1},{d:13,u:3,n:0},{d:14,u:2,n:2},{d:15,u:7,n:3},{d:16,u:1,n:1},{d:17},{d:18}].map(d=>`<div class="cc"><span class="dn">${d.d}</span>${d.u!==undefined?moon(M[d.u],20):'<div style="width:20px;height:20px"></div>'}${d.u!==undefined?star(M[d.n],20):'<div style="width:20px;height:20px"></div>'}</div>`).join('');
</script>
</body>
</html>

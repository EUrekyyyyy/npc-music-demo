<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心情图标设计稿 v3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1A1A2E;
  font-family: -apple-system, 'PingFang SC', sans-serif;
  color: #E8ECF4;
  padding: 40px 20px;
  display: flex; flex-direction: column; align-items: center;
}
h1 {
  font-size: 22px; font-weight: 700; margin-bottom: 6px;
  background: linear-gradient(135deg, #C4B5FD, #67B2FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 12px; color: rgba(232,236,244,0.35); margin-bottom: 36px; }
.section-title {
  font-size: 15px; font-weight: 600; margin: 28px 0 16px;
  display: flex; align-items: center; gap: 8px;
}
.badge { font-size: 10px; padding: 3px 10px; border-radius: 8px; font-weight: 500; }
.grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; max-width: 400px; width: 100%;
}
.icon-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.icon-label { font-size: 12px; color: rgba(232,236,244,0.5); font-weight: 500; }
.divider { width: 100%; max-width: 400px; height: 1px; background: rgba(255,255,255,0.05); margin: 28px 0; }
.sizes-row { display: flex; gap: 24px; align-items: flex-end; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
.size-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.size-label { font-size: 10px; color: rgba(232,236,244,0.25); }
.cal-preview {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  max-width: 360px; width: 100%; background: rgba(255,255,255,0.02);
  border-radius: 12px; padding: 10px; margin-top: 10px;
}
.cal-cell { display: flex; flex-direction: column; align-items: center; padding: 3px 0; gap: 2px; }
.cal-cell .day-n { font-size: 9px; color: rgba(232,236,244,0.2); }
</style>
</head>
<body>

<h1>心情图标 v3</h1>
<p class="subtitle">🌙 月亮 = 用户　⭐ 星星 = 智能体 · 圆润手绘风</p>

<div class="section-title">
  <span>🌙 月亮表情</span>
  <span class="badge" style="background:rgba(196,181,253,0.12);color:#C4B5FD;">用户</span>
</div>
<div class="grid" id="moonGrid"></div>

<div class="divider"></div>

<div class="section-title">
  <span>⭐ 星星表情</span>
  <span class="badge" style="background:rgba(103,178,255,0.12);color:#67B2FF;">智能体</span>
</div>
<div class="grid" id="starGrid"></div>

<div class="divider"></div>

<div class="section-title">📐 尺寸预览</div>
<div class="sizes-row" id="sizePreview"></div>

<div class="divider"></div>

<div class="section-title">📅 日历效果</div>
<div class="cal-preview" id="calPreview"></div>

<script>
const MOODS = [
  { id: 'happy',     label: '开心', fill: '#F4A261', shade: '#D8894A' },
  { id: 'heartbeat', label: '心动', fill: '#F4B4C8', shade: '#D89AAE' },
  { id: 'excited',   label: '兴奋', fill: '#F4D35E', shade: '#D8B948' },
  { id: 'calm',      label: '平静', fill: '#8BC98B', shade: '#6FAD6F' },
  { id: 'tired',     label: '心累', fill: '#C4B5A0', shade: '#A89A86' },
  { id: 'angry',     label: '生气', fill: '#E87461', shade: '#CC5A48' },
  { id: 'irritated', label: '烦躁', fill: '#9B9BC8', shade: '#7F7FAA' },
  { id: 'sad',       label: '伤心', fill: '#9CC8E8', shade: '#7AACCC' },
];

// ===== MOON: Chubby crescent, face on the front =====
function moonSVG(m, sz) {
  const s = sz || 80;
  return `<svg viewBox="0 0 100 100" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">
    ${moonDeco(m)}
    <!-- Chubby crescent body -->
    <path d="M60 10
             C82 10 94 28 94 50
             C94 72 82 90 60 90
             C46 90 34 82 28 70
             C38 78 50 76 58 68
             C68 58 68 42 58 32
             C50 24 38 22 28 30
             C34 18 46 10 60 10Z"
      fill="${m.fill}"/>
    <!-- Soft highlight -->
    <ellipse cx="78" cy="36" rx="10" ry="14" fill="#fff" opacity="0.1" transform="rotate(-15 78 36)"/>
    ${moonFace(m)}
  </svg>`;
}

function moonFace(m) {
  const F = {
    happy: `
      <circle cx="62" cy="42" r="3.5" fill="#3A3A3A"/>
      <circle cx="78" cy="42" r="3.5" fill="#3A3A3A"/>
      <circle cx="63" cy="41" r="1.2" fill="#fff"/>
      <circle cx="79" cy="41" r="1.2" fill="#fff"/>
      <path d="M60 55 Q70 65 82 55" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <circle cx="57" cy="52" r="4" fill="${m.shade}" opacity="0.5"/>
      <circle cx="85" cy="52" r="4" fill="${m.shade}" opacity="0.5"/>
    `,
    heartbeat: `
      <circle cx="62" cy="42" r="3.5" fill="#3A3A3A"/>
      <path d="M75 40 L79 44 L83 40" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="63" cy="41" r="1.2" fill="#fff"/>
      <path d="M60 55 Q70 62 82 55" stroke="#3A3A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="57" cy="52" r="4.5" fill="#E88" opacity="0.5"/>
      <circle cx="85" cy="52" r="4.5" fill="#E88" opacity="0.5"/>
    `,
    excited: `
      <path d="M58 40 L64 44 L58 48" stroke="#3A3A3A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M84 40 L78 44 L84 48" stroke="#3A3A3A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="70" cy="58" rx="7" ry="5" fill="#3A3A3A"/>
      <ellipse cx="70" cy="56" rx="5" ry="2.5" fill="${m.fill}" opacity="0.4"/>
      <circle cx="56" cy="52" r="4" fill="${m.shade}" opacity="0.5"/>
      <circle cx="86" cy="52" r="4" fill="${m.shade}" opacity="0.5"/>
    `,
    calm: `
      <path d="M59 43 Q63 39 67 43" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M75 43 Q79 39 83 43" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M63 55 Q70 60 79 55" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
    tired: `
      <line x1="58" y1="42" x2="68" y2="42" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="74" y1="42" x2="84" y2="42" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M65 55 Q70 58 76 55" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="70" cy="60" rx="4" ry="3.5" fill="#E8A0A0" opacity="0.7" stroke="#3A3A3A" stroke-width="1"/>
    `,
    angry: `
      <line x1="57" y1="37" x2="66" y2="41" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="85" y1="37" x2="76" y2="41" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="62" cy="44" r="2.5" fill="#3A3A3A"/>
      <circle cx="80" cy="44" r="2.5" fill="#3A3A3A"/>
      <path d="M62 58 Q66 54 70 58 Q74 62 80 56" stroke="#3A3A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    `,
    irritated: `
      <line x1="58" y1="37" x2="66" y2="41" stroke="#3A3A3A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="84" y1="37" x2="76" y2="41" stroke="#3A3A3A" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="62" cy="44" r="2.8" fill="#3A3A3A"/>
      <line x1="74" y1="44" x2="84" y2="44" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M64 56 Q68 60 72 56 Q76 52 80 56" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
    sad: `
      <ellipse cx="62" cy="42" rx="4" ry="5" fill="#3A3A3A"/>
      <ellipse cx="80" cy="42" rx="4" ry="5" fill="#3A3A3A"/>
      <circle cx="64" cy="40" r="2" fill="#fff" opacity="0.8"/>
      <circle cx="82" cy="40" r="2" fill="#fff" opacity="0.8"/>
      <path d="M64 58 Q70 54 78 58" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="65" cy="52" rx="1.5" ry="2.5" fill="${m.fill}" opacity="0.6"/>
    `,
  };
  return F[m.id] || F.calm;
}

function moonDeco(m) {
  const D = {
    happy: `
      <line x1="44" y1="18" x2="44" y2="28" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="39" y1="23" x2="49" y2="23" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    `,
    heartbeat: `
      <path d="M46 10 C46 5 50 4 52 8 C54 4 58 5 58 10 C58 16 52 20 52 20 C52 20 46 16 46 10Z" fill="#E85050" opacity="0.9"/>
    `,
    excited: `
      <line x1="44" y1="14" x2="48" y2="22" stroke="${m.shade}" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <line x1="36" y1="20" x2="42" y2="26" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="88" y1="16" x2="93" y2="12" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    `,
    calm: ``,
    tired: `
      <circle cx="50" cy="18" r="5" fill="${m.fill}" opacity="0.25"/>
      <circle cx="44" cy="14" r="3.5" fill="${m.fill}" opacity="0.2"/>
      <circle cx="56" cy="16" r="3" fill="${m.fill}" opacity="0.18"/>
    `,
    angry: `
      <path d="M62 8 Q59 3 62 0" stroke="#BBB" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M70 5 Q67 0 70 -3" stroke="#BBB" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M78 8 Q75 3 78 0" stroke="#BBB" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    `,
    irritated: `
      <path d="M42 18 Q46 14 44 18 Q42 22 46 20 Q50 18 48 22 Q46 26 50 24" stroke="${m.shade}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    `,
    sad: `
      <line x1="58" y1="72" x2="55" y2="84" stroke="${m.shade}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <line x1="68" y1="74" x2="65" y2="86" stroke="${m.shade}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <line x1="78" y1="72" x2="75" y2="84" stroke="${m.shade}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    `,
  };
  return D[m.id] || '';
}

// ===== STAR: Very round puffy 5-point, face centered =====
function starSVG(m, sz) {
  const s = sz || 80;
  return `<svg viewBox="0 0 100 100" width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">
    ${starDeco(m)}
    <!-- Super round puffy star -->
    <path d="M50 6
             C53 6 56 16 58 20 C60 24 64 24 68 22
             C72 20 78 14 82 16 C86 18 86 26 84 30
             C82 34 80 38 82 42 C84 46 92 48 94 52
             C96 56 92 60 88 62 C84 64 80 64 78 68
             C76 72 78 80 76 84 C74 88 68 88 64 86
             C60 84 56 80 52 80 C48 80 44 84 40 86
             C36 88 30 88 28 84 C26 80 28 72 26 68
             C24 64 20 64 16 62 C12 60 8 56 10 52
             C12 48 20 46 22 42 C24 38 22 34 20 30
             C18 26 18 18 22 16 C26 14 32 20 36 22
             C40 24 44 24 46 20 C48 16 47 6 50 6Z"
      fill="${m.fill}"/>
    <!-- Soft highlight -->
    <ellipse cx="38" cy="34" rx="8" ry="10" fill="#fff" opacity="0.1" transform="rotate(-10 38 34)"/>
    ${starFace(m)}
  </svg>`;
}

function starFace(m) {
  const F = {
    happy: `
      <circle cx="38" cy="44" r="4" fill="#3A3A3A"/>
      <circle cx="62" cy="44" r="4" fill="#3A3A3A"/>
      <circle cx="39.5" cy="42.5" r="1.5" fill="#fff"/>
      <circle cx="63.5" cy="42.5" r="1.5" fill="#fff"/>
      <path d="M38 58 Q50 68 64 58" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <circle cx="33" cy="55" r="4.5" fill="${m.shade}" opacity="0.5"/>
      <circle cx="69" cy="55" r="4.5" fill="${m.shade}" opacity="0.5"/>
    `,
    heartbeat: `
      <circle cx="38" cy="44" r="4" fill="#3A3A3A"/>
      <path d="M58 42 L62 46 L66 42" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="39.5" cy="42.5" r="1.5" fill="#fff"/>
      <path d="M38 58 Q50 66 64 58" stroke="#3A3A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="33" cy="55" r="5" fill="#E88" opacity="0.5"/>
      <circle cx="69" cy="55" r="5" fill="#E88" opacity="0.5"/>
    `,
    excited: `
      <path d="M34 42 L40 46 L34 50" stroke="#3A3A3A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M68 42 L62 46 L68 50" stroke="#3A3A3A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse cx="50" cy="60" rx="7" ry="5.5" fill="#3A3A3A"/>
      <ellipse cx="50" cy="58" rx="5" ry="2.5" fill="${m.fill}" opacity="0.4"/>
      <circle cx="30" cy="54" r="4.5" fill="${m.shade}" opacity="0.5"/>
      <circle cx="72" cy="54" r="4.5" fill="${m.shade}" opacity="0.5"/>
    `,
    calm: `
      <path d="M35 45 Q39 41 43 45" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M57 45 Q61 41 65 45" stroke="#3A3A3A" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M42 58 Q50 63 60 58" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
    tired: `
      <line x1="34" y1="44" x2="44" y2="44" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="56" y1="44" x2="66" y2="44" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M44 57 Q50 60 56 57" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="62" rx="4" ry="3.5" fill="#E8A0A0" opacity="0.7" stroke="#3A3A3A" stroke-width="1"/>
    `,
    angry: `
      <line x1="32" y1="38" x2="42" y2="42" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="70" y1="38" x2="60" y2="42" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <circle cx="38" cy="46" r="2.8" fill="#3A3A3A"/>
      <circle cx="64" cy="46" r="2.8" fill="#3A3A3A"/>
      <path d="M40 60 Q44 56 50 60 Q56 64 62 58" stroke="#3A3A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    `,
    irritated: `
      <line x1="33" y1="38" x2="42" y2="42" stroke="#3A3A3A" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="69" y1="38" x2="60" y2="42" stroke="#3A3A3A" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="38" cy="46" r="3" fill="#3A3A3A"/>
      <line x1="58" y1="46" x2="68" y2="46" stroke="#3A3A3A" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M42 58 Q46 62 50 58 Q54 54 60 58" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    `,
    sad: `
      <ellipse cx="38" cy="44" rx="4.5" ry="5.5" fill="#3A3A3A"/>
      <ellipse cx="62" cy="44" rx="4.5" ry="5.5" fill="#3A3A3A"/>
      <circle cx="40" cy="42" r="2.2" fill="#fff" opacity="0.8"/>
      <circle cx="64" cy="42" r="2.2" fill="#fff" opacity="0.8"/>
      <path d="M42 60 Q50 56 60 60" stroke="#3A3A3A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="42" cy="54" rx="1.5" ry="2.5" fill="${m.fill}" opacity="0.6"/>
      <ellipse cx="60" cy="54" rx="1.5" ry="2.5" fill="${m.fill}" opacity="0.5"/>
    `,
  };
  return F[m.id] || F.calm;
}

function starDeco(m) {
  const D = {
    happy: `
      <line x1="74" y1="18" x2="74" y2="28" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="69" y1="23" x2="79" y2="23" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    `,
    heartbeat: `
      <path d="M30 8 C30 3 34 2 36 6 C38 2 42 3 42 8 C42 14 36 18 36 18 C36 18 30 14 30 8Z" fill="#E85050" opacity="0.9"/>
    `,
    excited: `
      <line x1="76" y1="8" x2="80" y2="2" stroke="${m.shade}" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <line x1="82" y1="12" x2="88" y2="8" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <line x1="18" y1="12" x2="12" y2="8" stroke="${m.shade}" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    `,
    calm: ``,
    tired: `
      <circle cx="72" cy="16" r="5" fill="${m.fill}" opacity="0.2"/>
      <circle cx="78" cy="12" r="3.5" fill="${m.fill}" opacity="0.18"/>
      <circle cx="66" cy="13" r="3" fill="${m.fill}" opacity="0.15"/>
    `,
    angry: `
      <path d="M40 2 Q37 -3 40 -5" stroke="#BBB" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M50 0 Q47 -5 50 -7" stroke="#BBB" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M60 2 Q57 -3 60 -5" stroke="#BBB" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    `,
    irritated: `
      <path d="M72 16 Q76 12 74 16 Q72 20 76 18 Q80 16 78 20" stroke="${m.shade}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    `,
    sad: `
      <line x1="34" y1="74" x2="31" y2="86" stroke="${m.shade}" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="50" y1="76" x2="47" y2="88" stroke="${m.shade}" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="66" y1="74" x2="63" y2="86" stroke="${m.shade}" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    `,
  };
  return D[m.id] || '';
}

// ===== Render =====
const moonGrid = document.getElementById('moonGrid');
MOODS.forEach(m => {
  const cell = document.createElement('div');
  cell.className = 'icon-cell';
  cell.innerHTML = `${moonSVG(m, 80)}<span class="icon-label">${m.label}</span>`;
  moonGrid.appendChild(cell);
});

const starGrid = document.getElementById('starGrid');
MOODS.forEach(m => {
  const cell = document.createElement('div');
  cell.className = 'icon-cell';
  cell.innerHTML = `${starSVG(m, 80)}<span class="icon-label">${m.label}</span>`;
  starGrid.appendChild(cell);
});

// Size preview
const sizeRow = document.getElementById('sizePreview');
[{s:22,l:'日历'},{s:36,l:'详情'},{s:52,l:'选择'},{s:80,l:'大图'}].forEach(sz => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `<div style="display:flex;gap:6px;">${moonSVG(MOODS[0],sz.s)}${starSVG(MOODS[1],sz.s)}</div><span class="size-label">${sz.l} ${sz.s}px</span>`;
  sizeRow.appendChild(item);
});

// Calendar preview
const calEl = document.getElementById('calPreview');
[{d:12,u:0,n:1},{d:13,u:3,n:0},{d:14,u:2,n:2},{d:15,u:7,n:3},{d:16,u:1,n:1},{d:17},{d:18}].forEach(day => {
  const cell = document.createElement('div');
  cell.className = 'cal-cell';
  const hasData = day.u !== undefined;
  cell.innerHTML = `<span class="day-n">${day.d}</span>
    ${hasData ? moonSVG(MOODS[day.u], 20) : '<div style="width:20px;height:20px;"></div>'}
    ${hasData ? starSVG(MOODS[day.n], 20) : '<div style="width:20px;height:20px;"></div>'}`;
  calEl.appendChild(cell);
});
</script>
</body>
</html>
